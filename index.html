<script>
/* ══════════════════════════════════════════════════════════
   서버 설정 — 배포 전 이 두 줄만 고치면 됩니다
   ══════════════════════════════════════════════════════════
   API_URL : Google Apps Script 웹 앱 주소(.../exec)를 따옴표 안에 붙여 넣으세요.
             비워 두면 서버 없이 '제출 코드' 방식으로 동작합니다.
   TEACHER_CODE : 교수용 화면 접속 코드
*/
const API_URL='https://script.google.com/macros/s/AKfycbxSIizajTeeytHMFTAd61Yy6UPko47g7-ac4ypvmlchsRamEu6mOsE-chIa9957POc2/exec';
const TEACHER_CODE='yn2026';

async function apiCall(payload){
  if(!API_URL)throw new Error('no-api');
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)});
  if(!r.ok)throw new Error('http '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'server error');
  return j;
}

const mem={};
const HAS_WS=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}
async function sget(k){
  if(HAS_WS){try{const r=await window.storage.get(k);if(r)return JSON.parse(r.value)}catch(e){}}
  const l=lsGet(k);if(l!==null)return l;
  return mem[k]??null;
}
async function sset(k,v){
  mem[k]=v;lsSet(k,v);
  if(HAS_WS){try{await window.storage.set(k,JSON.stringify(v))}catch(e){}}
}
function copyText(t){
  const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity='0';
  document.body.appendChild(a);a.select();
  let ok=false;try{ok=document.execCommand('copy')}catch(e){}
  document.body.removeChild(a);return ok;
}
let S={diag:{},ws:{},chk:{},quiz:{done:0,right:0,wrong:[]},train:{},profile:{}};
async function load(){const d=await sget('img:state');if(d)S=Object.assign(S,d)}
let saveT;function save(){clearTimeout(saveT);saveT=setTimeout(()=>sset('img:state',S),350)}

const DIAG=["나는 내 강점을 분명하게 말할 수 있다","나는 목표 이미지를 한 문장으로 말할 수 있다","나는 요소별 전략(컬러·표정·자세)이 있다","나는 카메라·발표 앞에서 자신감이 있다","나는 나를 비하 없이 강점 중심으로 본다","나는 배운 것을 실제로 실천하고 있다"];

const CH=[
{n:1,t:"이미지메이킹의 이해",s:"3대 구성요소 · 메라비언 · 첫인상",
g:["이미지메이킹을 진로 맥락에서 설명한다","이미지의 3대 구성요소를 구분한다","메라비언 법칙을 정확한 범위에서 적용한다","나의 첫 3초를 설계한다"],
th:[
["이미지란 무엇인가","이미지는 내가 가진 그대로가 아니라, 그것이 남에게 '지각된 결과'다. 같은 사람도 보는 사람과 상황에 따라 다르게 읽힌다. 그래서 이미지는 타고나는 것이 아니라 관리하고 배울 수 있는 영역이 된다.","이미지메이킹은 없는 것을 꾸며내는 기술이 아니다. 나의 강점을 발견해 그것이 제대로 전달되도록 다듬는 과정이다. 목표는 다른 사람이 되는 것이 아니라, 가장 나다운 모습이 잘 보이게 하는 것이다."],
["3대 구성요소","외적 이미지는 눈에 보이는 것이다. 표정·자세·헤어·패션·컬러가 여기 속한다. 가장 빠르게 전달되지만 이것만으로는 오래가지 못한다.","내적 이미지는 행동으로 드러나는 사람됨이다. 태도·매너·자신감·성실함이 여기 속한다. 외적 이미지가 문을 열어준다면 내적 이미지는 신뢰를 만든다.","사회적 이미지는 관계와 평판 속의 나다. 사람들이 나에 대해 하는 이야기, SNS에 쌓인 기록, 업계에서의 평판이다. 셋이 같은 메시지를 보낼 때 비로소 '저 사람답다'는 인상이 완성된다."],
["첫인상은 얼마나 빠른가","얼굴을 0.1초만 봐도 신뢰감·유능함의 판단이 만들어진다. 시간이 더 주어져도 판단이 뒤집히기보다 '내 판단이 맞다'는 확신만 강해진다.","그래서 중요한 것은 첫 3초의 설계다. 오디션장에 들어서는 순간, 카메라가 켜지는 순간, 영상의 첫 장면. 이 짧은 구간에 무엇을 보여줄지 미리 정해둔 사람과 그렇지 않은 사람의 차이는 크다."],
["말·목소리·표정의 관계","사람은 상대의 말과 표정이 어긋날 때 표정과 목소리를 더 믿는다. '괜찮아요'라고 말하면서 굳은 표정을 짓는 사람을 우리는 괜찮다고 여기지 않는다.","여기서 나온 것이 메라비언의 7-38-55다. 다만 이 숫자는 감정과 태도가 채널마다 엇갈릴 때의 가중치이지 모든 대화에 적용되는 법칙이 아니다. 진짜 교훈은 '말과 비언어를 일치시켜라'다."],
["모델테이너에게 이미지란","모델은 옷과 콘셉트를 몸으로 번역하고, 방송인은 화면 너머로 신뢰를 전달하고, 오디션 지원자는 몇 분 안에 가능성을 보여주고, 인플루언서는 화면 속 일관된 인상으로 사람을 모은다.","네 진로 모두 '짧은 시간에 정확한 인상을 전달하는 능력'을 요구한다. 이것이 이 과목을 배우는 이유다. 실력을 기회로 연결하는 다리가 바로 이미지다."]],
ev:"윌리스·토도로프(2006): 얼굴을 100ms(0.1초) 노출한 것만으로 신뢰성·유능함·매력의 판단이 형성되었고, 노출 시간을 늘려도 판단 자체보다 확신이 강해졌다.",
my:["'말의 내용은 7%만 중요하다'","메라비언의 7-38-55는 감정·태도가 말과 표정·목소리에서 서로 어긋날 때의 가중치다. 정보를 전달하는 대화 전반에 적용하는 것은 오용이며, 메라비언 본인도 이를 경계했다. 정확한 교훈은 '말과 비언어를 일치시켜라'이다."],
cs:[["모델","런웨이에서 모델은 옷의 실루엣을 가장 잘 보여주는 '움직이는 선'이 된다. 표정·워킹·라인이 옷의 콘셉트와 어긋나면 아무리 좋은 옷도 살지 않는다."],
["방송","진행자의 첫 3초는 인사와 미소다. 이 순간에 신뢰감이 결정되고, 시청자는 그 인상으로 남은 방송을 본다."],
["오디션","심사위원은 문이 열리고 인사하는 몇 초 만에 '준비된 사람인가'를 읽는다. 자기소개를 시작하기도 전에 이미 절반이 전달된다."],
["인플루언서","영상의 첫 3초에 시청 지속 여부가 갈린다. 썸네일과 첫 장면이 곧 첫인상이다."]],
ws:[["내 이미지 3요소 진단","외적·내적·사회적 이미지를 각각 한 줄로 적어보자"],["나의 첫 3초 설계","진로 장면에서 첫 3초에 보여줄 표정·자세·말은?"],["롤모델 분석","닮고 싶은 인물 1명과 그의 이미지에서 배울 점 3가지"]],
ck:["이미지의 3대 구성요소를 말할 수 있다","이미지가 '지각된 결과'임을 설명할 수 있다","메라비언 법칙의 적용 범위를 안다","첫인상 0.1초의 의미를 안다","나의 첫 3초를 설계했다"],
sum:["이미지는 실제가 아니라 남에게 지각된 결과이므로 관리할 수 있다","외적·내적·사회적 이미지가 같은 메시지를 보낼 때 신뢰가 생긴다","첫인상은 0.1초에 형성되고 시간이 지나면 확신만 강해진다","메라비언 7-38-55는 감정 불일치 상황의 가중치다","모델테이너의 네 진로 모두 짧은 시간의 인상 전달을 요구한다"],
disc:["첫인상이 끝까지 맞았던 경험과 빗나갔던 경험은?","내 진로의 '첫 장면'은 정확히 몇 초이며 무엇으로 구성되는가?","이미지메이킹이 '꾸미는 것'과 어떻게 다른지 내 말로 설명해보자"],
mi:"롤모델 1명의 이미지를 3요소로 분석하고 배울 점 3가지 적기",
tm:[["이미지","실제가 아니라 타인에게 지각된 인상의 총합"],["외적 이미지","표정·자세·패션·컬러 등 보이는 요소"],["내적 이미지","태도·매너·자신감 등 행동으로 드러나는 사람됨"],["사회적 이미지","평판·SNS 등 관계 속에서 형성된 이미지"],["메라비언 법칙","감정 불일치 시 시각55·청각38·언어7의 가중치"]]},

{n:2,t:"첫인상과 인상 관리",s:"초두 · 후광 · 부정성 편향",
g:["초두·후광·부정성 편향을 구분해 설명한다","인상 형성의 원리를 진로에 적용한다","건강한 자기제시 전략을 안다","첫인상을 갱신하는 방법을 설명한다"],
th:[
["인상은 합이 아니라 구성","애쉬는 인상이 개별 특성의 산술합이 아니라 '조직된 전체'임을 보였다. 사람들은 특성을 하나씩 더해가는 게 아니라 먼저 큰 그림을 만들고 나머지를 거기 맞춰 해석한다.","특히 '따뜻한/차가운' 같은 특성은 중심특질이라 불린다. 이 하나가 바뀌면 나머지 정보의 해석이 전부 달라진다. '똑똑하다'는 정보도 따뜻한 사람에게선 지혜로, 차가운 사람에게선 계산적으로 읽힌다."],
["초두효과","먼저 들어온 정보가 해석의 틀을 만든다. 같은 형용사 목록도 순서만 바꾸면 전혀 다른 인상이 형성된다.","현장에서 이것은 '처음 만난 자리의 인상이 이후 모든 만남의 배경이 된다'는 뜻이다. 나중에 잘하는 것보다 처음을 준비하는 편이 훨씬 효율적이다."],
["후광효과","두드러진 한 가지 특성이 다른 평가로 번지는 현상이다. 인상이 좋으면 성실할 것 같고 실력도 있을 것 같다고 느낀다.","이 효과는 양날의 칼이다. 강점 하나가 전체를 끌어올릴 수도, 약점 하나가 전체를 끌어내릴 수도 있다. 그래서 '가장 자신 있는 한 가지'를 또렷하게 보여주는 전략이 유효하다."],
["부정성 편향","나쁜 정보는 좋은 정보보다 더 빠르고 강하게, 더 오래 각인된다. 잘한 일 여러 번보다 무례 한 번이 오래 남는다.","여기서 나오는 실무 결론이 '기본기가 이미지의 방어선'이라는 것이다. 시간 약속, 인사, 예의 같은 기본은 잘해서 점수를 따는 항목이 아니라 어기면 크게 잃는 항목이다."],
["무대 앞과 무대 뒤","고프먼은 사회생활을 연극에 비유했다. 관객 앞에서 배역을 연기하는 '무대 앞'과 그것을 준비하는 '무대 뒤'가 있다는 것이다.","오디션 심사장이 무대 앞이라면 대기실은 무대 뒤다. 다만 현장에서는 대기실도 누군가 보고 있다. 건강한 자기제시는 조작이 아니라 강점의 진정성 있는 편집이며, 가식은 결국 말과 표정의 불일치로 드러난다."]],
ev:"애쉬(1946): 동일한 형용사 목록도 제시 순서만 바꾸면 전혀 다른 인상이 형성되었다. 인상은 특성의 합이 아니라 조직된 전체라는 구성주의의 근거다.",
my:["'첫인상은 절대 못 바꾼다'","어렵지만 가능하다. 강한 반증 행동을 일관되게 반복하거나 자주 마주쳐 익숙해지면 인상은 갱신된다. 다만 처음을 설계하는 편이 훨씬 적은 노력으로 같은 결과를 만든다."],
cs:[["모델","캐스팅 담당자는 수십 명의 프로필을 넘겨본다. 첫 장의 한 컷이 후광이 되어 나머지 사진의 해석까지 바꾼다."],
["방송","방송에서 한 번의 실언은 오래 회자된다. 부정성 편향이 강하게 작동하는 대표적 현장이다."],
["오디션","대기실 태도가 심사에 반영되는 경우가 많다. 무대 뒤라고 생각한 곳이 이미 무대 앞일 수 있다."],
["인플루언서","댓글 대응 한 번이 채널 전체의 인상을 바꾼다. 쌓아온 호감보다 실수 하나가 강하게 남는다."]],
ws:[["나의 첫인상 진단","동료 3명에게 들은 내 첫인상 키워드"],["갱신 전략","바꾸고 싶은 인상과 그 방법 한 가지"],["나의 자기제시 전략","내가 자주 쓰는 방식과 개선점"]],
ck:["초두효과를 설명할 수 있다","후광효과를 설명할 수 있다","부정성 편향과 기본기의 관계를 안다","중심특질의 개념을 안다","무대 앞/뒤 개념을 진로에 적용할 수 있다"],
sum:["인상은 특성의 합이 아니라 먼저 만들어진 틀에 맞춰 해석된 전체다","초두효과 때문에 처음 정보가 이후 해석의 배경이 된다","후광효과는 강점을 키우기도 약점을 키우기도 한다","부정성 편향 탓에 기본기는 이미지의 방어선이다","건강한 자기제시는 조작이 아니라 강점의 진정성 있는 편집이다"],
disc:["부정성 편향을 생각하면 절대 하지 말아야 할 '치명적 한 가지'는?","건강한 자기제시와 가식의 경계는 어디일까?","내 첫인상을 바꾼 경험이 있다면 무엇이 그것을 가능하게 했나?"],
mi:"동료에게 첫인상 피드백을 받고 갱신 전략 1가지를 일주일 실천",
tm:[["초두효과","먼저 입력된 정보가 전체 인상을 좌우하는 현상"],["후광효과","두드러진 한 특성이 다른 평가로 번지는 현상"],["부정성 편향","부정 정보가 더 강하고 오래 각인되는 경향"],["중심특질","전체 인상의 해석을 바꾸는 핵심 특성"],["자기제시","상황에 맞게 자신을 표현하는 전략적 행동"]]},

{n:3,t:"자기 이미지 진단",s:"조하리의 창 · 이미지 SWOT",
g:["조하리의 창 4영역을 설명한다","이미지 SWOT로 자기를 진단한다","현재와 목표의 간격을 분석한다","목표 이미지 키워드 3개를 설정한다"],
th:[
["출발점은 정확한 자기 인식","이미지메이킹의 토대는 높은 자존감이 아니라 정확한 자기 인식이다. 내가 보는 나와 남이 보는 나 사이에 얼마나 간격이 있는지 아는 것에서 시작한다.","자기 인식에는 체계적인 한계가 있다. 특히 매력·사교성처럼 겉으로 드러나는 특질은 본인보다 타인이 더 정확하게 안다. 그래서 피드백이 필요하다."],
["조하리의 창","열린 창은 나도 알고 남도 아는 영역, 보이지 않는 창은 남만 아는 영역, 숨겨진 창은 나만 아는 영역, 미지의 창은 아직 아무도 모르는 가능성이다.","무대에 서는 사람에게 가장 위험한 것은 보이지 않는 창이다. 나도 모르는 말버릇, 굳는 표정, 기울어진 자세가 카메라에 그대로 잡힌다. 이 영역은 피드백을 받아들일 때만 줄어든다."],
["이미지 SWOT","강점과 약점은 내부 요인, 기회와 위협은 외부 요인이다. 내가 가진 것과 환경이 주는 것을 나눠 보면 전략이 보인다.","여기서 약점은 비하의 대상이 아니라 '연출로 전환할 전략 정보'다. 목소리가 작다는 것은 결점이 아니라 발성 훈련이라는 과제이고, 개성 있는 이목구비는 캐릭터라는 자산이 될 수 있다."],
["현재와 목표의 간격","진단이 끝나면 목표를 정한다. '지금의 나'와 '되고 싶은 나' 사이의 간격이 곧 이 학기의 학습 과제다.","간격을 막연히 '더 나아지기'로 두면 무엇을 해야 할지 알 수 없다. 컬러·표정·자세·목소리·태도 중 무엇을 얼마나 채울지 구체적으로 나눠야 실행이 가능해진다."],
["목표 이미지 키워드 3개","목표 이미지는 키워드 세 개로 압축한다. '신뢰감 있는 / 밝은 / 프로페셔널한' 같은 식이다.","이 세 단어는 앞으로 모든 선택의 기준이 된다. 어떤 색을 입을지, 어떤 표정을 연습할지, 어떤 콘텐츠를 올릴지 고민될 때마다 '내 키워드에 맞는가'를 물으면 된다."]],
ev:"베이지어(2010) SOKA 모형: 매력·사교성처럼 외현적이고 평가적인 특질은 본인보다 타인이 더 정확히 판단한다. 동료 피드백이 필요한 학술적 이유다.",
my:["'약점은 감춰야 한다'","약점은 전략 정보다. 감추려 들면 위축되고 표현이 작아진다. 알고 나면 연출로 전환하거나 훈련 과제로 바꿀 수 있다. 이 수업의 목표는 결점 제거가 아니라 강점 강화다."],
cs:[["모델","자신의 라인과 분위기를 정확히 아는 모델은 셀프 화보에서도 강하다. 진단이 곧 무기가 된다."],
["방송","자신의 말버릇을 모르는 진행자는 같은 실수를 반복한다. 모니터링과 피드백이 성장의 핵심이다."],
["오디션","'저는 어떤 캐릭터인가'에 답할 수 있는 지원자가 기억된다. 진단 없이는 그 답이 나오지 않는다."],
["인플루언서","채널 콘셉트는 자기 진단에서 나온다. 내 강점이 무엇인지 모르면 콘셉트도 흔들린다."]],
ws:[["나의 강점 3가지",""],["나의 목표 이미지 키워드 3개","예: 신뢰감 있는 / 밝은 / 프로페셔널한"],["현재와 목표의 간격","무엇을 채워야 하나"]],
ck:["조하리의 창 4영역을 안다","보이지 않는 창을 줄이는 방법을 안다","SWOT의 내부·외부 요인을 구분한다","약점을 전략 정보로 볼 수 있다","목표 키워드 3개를 정했다"],
sum:["이미지메이킹의 토대는 높은 자존감이 아니라 정확한 자기 인식이다","보이지 않는 창은 피드백을 받아들일 때만 줄어든다","SWOT의 약점은 비하 대상이 아니라 전략 정보다","현재와 목표의 간격이 곧 학습 과제다","목표 키워드 3개가 이후 모든 선택의 기준이 된다"],
disc:["동료가 알려준 '몰랐던 나'가 있었는가?","내 약점 하나를 강점이나 개성으로 다시 쓴다면?","내 목표 키워드 3개는 서로 잘 어울리는가?"],
mi:"이미지 진단 보고서를 정리하고 목표 키워드 3개 확정하기",
tm:[["조하리의 창","자기·타인 인식의 교차로 만든 4영역"],["보이지 않는 창","남은 알지만 나는 모르는 영역"],["이미지 SWOT","강점·약점·기회·위협의 구조화된 성찰 틀"],["목표 이미지","되고 싶은 나의 인상을 압축한 키워드"],["갭 분석","현재와 목표 사이 간격을 파악하는 작업"]]},

{n:4,t:"퍼스널 컬러와 컬러 이미지",s:"웜/쿨 · 드레이핑 · 색채 심리",
g:["색의 3속성과 색채 심리를 설명한다","웜·쿨 언더톤을 구분한다","자가 진단으로 어울리는 색을 탐색한다","베이스·포인트 컬러 전략을 설계한다"],
th:[
["색은 가장 빠른 신호","색은 형태나 글자보다 먼저 눈에 들어와 감정을 건드린다. 면접장에서 네이비 재킷을 입은 사람은 말을 꺼내기 전에 이미 '신뢰감 있다'는 신호를 보낸다.","색상·명도·채도 세 속성을 조절하면 같은 파랑도 산뜻한 하늘색부터 묵직한 네이비까지 전혀 다른 인상이 된다. 색을 다룬다는 건 이 세 가지를 의도적으로 고른다는 뜻이다."],
["퍼스널 컬러란","타고난 피부·눈동자·머리카락의 색조와 조화를 이뤄 얼굴을 생기 있게 보이게 하는 색의 무리다. 핵심 개념은 언더톤이다.","피부 바탕에 노란기가 도는 따뜻한 느낌이면 웜톤, 붉은기나 푸른기가 도는 시원한 느낌이면 쿨톤이다. 여기에 명도·채도를 더해 봄·여름·가을·겨울로 나누기도 하지만, 사람의 색조는 연속적이라 경계에 걸치는 경우가 많다."],
["드레이핑 — 직접 확인하기","진단 원리는 단순하다. 얼굴 아래에 여러 색의 천을 대어보며 어떤 색일 때 혈색이 살고 윤곽이 또렷해지는지 비교하는 것이다.","반드시 자연광에서, 화장기 없는 상태로 봐야 정확하다. 잘 받는 색은 피부가 균일하고 생기 있어 보이며 눈이 또렷해진다. 덜 받는 색은 그늘과 잡티가 도드라진다."],
["색채 심리","색마다 사람들이 보편적으로 떠올리는 연상이 있다. 빨강은 열정과 주목, 파랑과 네이비는 신뢰와 차분함, 노랑은 밝음과 친근함, 검정은 세련과 절제, 흰색은 깨끗함과 단정함이다.","다만 이 연상은 경향이지 법칙이 아니다. 문화와 맥락에 따라 달라지므로 '이 색은 반드시 이런 뜻'이라고 단정하기보다 상황에 맞게 활용하는 감각이 필요하다."],
["베이스 + 포인트 전략","실전에서 가장 쉬운 공식은 베이스 7 : 포인트 3이다. 옷의 대부분은 무난한 베이스 색으로 채우고, 잘 받는 색 하나를 얼굴 가까이에 포인트로 둔다.","잘 받는 색은 얼굴 가까이(상의·스카프·메이크업)에, 그렇지 않은 색은 얼굴에서 먼 곳(하의·소품)에 배치한다. 인플루언서라면 이 포인트 색을 시그니처로 고정해 '기억되는 색'을 만들 수 있다."]],
ev:"색을 계절로 묶어 분석하는 방식은 이텐의 색채론에서 출발해 캐롤 잭슨의 『Color Me Beautiful』(1980)로 대중화되었다. 다만 표준화된 과학적 측정이라기보다 실무 가이드에 가깝다.",
my:["'안 맞는 색은 절대 입으면 안 된다'","퍼스널 컬러는 금지 목록이 아니라 활용 도구다. 덜 어울리는 색도 얼굴에서 먼 위치, 소재, 메이크업으로 얼마든지 소화할 수 있다. 색은 규칙이 아니라 선택지를 넓혀주는 정보다."],
cs:[["모델","화보에서 모델은 콘셉트가 정한 색의 분위기를 몸으로 표현한다. 자신의 컬러를 알면 셀프 촬영에서 얼굴을 가장 살리는 선택을 할 수 있다."],
["방송","뉴스·교양 진행자가 네이비와 버건디를 자주 입는 데는 이유가 있다. 신뢰와 안정의 연상 때문이다. 반대로 쨍한 형광색은 화면에서 번져 보여 피한다."],
["오디션","깔끔한 베이스 색에 잘 받는 포인트 색 하나가 안전하면서도 또렷하다. 화려함보다 '얼굴이 사는 색'이 우선이다."],
["인플루언서","시그니처 컬러를 정해 썸네일·배경·의상에 반복하면 구독자는 그 색만 봐도 채널을 떠올린다."]],
ws:[["내 컬러 방향","웜 / 쿨 / 아직 탐색 중 — 그렇게 본 이유는?"],["나의 베이스 + 포인트 컬러",""],["진로 장면별 컬러 활용","면접·무대·콘텐츠에서 각각 어떤 색을?"]],
ck:["색의 3속성을 안다","웜톤과 쿨톤을 구분한다","드레이핑의 원리와 조건을 안다","퍼스널 컬러가 활용 도구임을 안다","베이스+포인트 전략을 세웠다"],
sum:["색은 형태보다 먼저 감정을 건드리는 가장 빠른 신호다","퍼스널 컬러는 타고난 색조와 조화되는 색의 무리이며 웜·쿨이 출발점이다","드레이핑은 자연광에서 민낯으로 해야 정확하다","색채 연상은 경향이지 법칙이 아니다","베이스 7 : 포인트 3이 실전에서 가장 안정적인 공식이다"],
disc:["내가 자주 입는 색과 그때 사람들의 반응은?","퍼스널 컬러에 '안 맞는' 색을 멋지게 소화한 사례를 본 적 있는가?","내 시그니처 컬러를 하나 정한다면 무엇이고 왜인가?"],
mi:"자연광에서 잘 받는 색과 덜 받는 색을 얼굴에 대어 사진으로 비교",
tm:[["색의 3속성","색상·명도·채도"],["언더톤","피부 바탕의 색기운(웜·쿨)"],["드레이핑","천을 대어 어울리는 색을 비교하는 진단법"],["베이스 컬러","전체의 바탕이 되는 무난한 색"],["시그니처 컬러","반복해 나를 떠올리게 만드는 대표 색"]]},

{n:5,t:"얼굴 이미지",s:"얼굴형 강점 · 헤어 · 메이크업",
g:["얼굴 이미지가 표현으로 완성됨을 설명한다","내 얼굴 특징을 강점으로 분석한다","헤어·메이크업의 기초 원리를 설명한다","진로에 맞는 연출 방향을 제안한다"],
th:[
["형태보다 표현","우리가 누군가를 떠올릴 때 가장 먼저 그려지는 것은 얼굴이다. 그러나 기억에 남는 얼굴이 반드시 정해진 미의 기준에 맞는 얼굴은 아니다.","호감의 큰 부분은 자주 봐서 생긴 익숙함과 따뜻한 표정에서 온다. 얼굴 이미지는 타고난 형태를 고치는 일이 아니라 나의 특징을 이해하고 표현하는 일이다."],
["얼굴형은 우열이 없다","둥근형은 부드럽고 친근한 인상, 각진형은 또렷하고 개성 있는 윤곽, 긴형은 성숙하고 시크한 분위기, 계란형은 균형 잡힌 안정감, 하트형은 화사하고 생기 있는 인상을 가진다.","이 분류의 목적은 어느 형이 나은지 가리는 것이 아니라 각 형의 매력을 알고 살리는 데 있다. 실제 얼굴은 대부분 여러 형이 섞여 있으니 분류에 자신을 맞추기보다 '가장 마음에 드는 부분'을 강조하면 된다."],
["헤어는 얼굴의 액자","같은 얼굴도 앞머리 유무, 길이, 볼륨의 위치에 따라 분위기가 크게 달라진다. 원리는 두 가지다.","첫째는 시선 유도다. 볼륨이나 포인트가 있는 쪽으로 시선이 모인다. 둘째는 리듬이다. 세로가 길게 느껴지면 가로 볼륨으로, 가로가 넓게 느껴지면 세로 라인으로 균형을 준다. 이건 규칙이 아니라 원리이므로 취향에 따라 얼마든지 다르게 적용할 수 있다."],
["메이크업의 목적","메이크업의 목적은 다른 사람이 되거나 무언가를 가리는 것이 아니다. 핵심은 균형과 생기다.","베이스로 피부 톤을 고르게, 눈썹으로 인상의 뼈대를, 입술로 혈색과 분위기를 만든다. 이 세 축만 정돈해도 얼굴은 또렷하고 건강해 보인다. 일상에서는 자연스러운 생기 정도로, 무대와 카메라에서는 조명에 묻히지 않도록 조금 더 또렷하게 조절한다."],
["표정이 완성한다","아무리 잘 다듬은 헤어와 메이크업도 표정이 굳어 있으면 인상은 살지 않는다. 반대로 자연스러운 미소 하나가 평범한 컨디션의 얼굴을 단숨에 호감으로 바꾼다.","얼굴 이미지의 마지막 완성은 표정이다. 8장에서 본격적으로 훈련하게 될 부분이며 실제 현장에서 가장 큰 차이를 만드는 요소이기도 하다."]],
ev:"토도로프의 얼굴 인상 연구: 사람들은 얼굴에서 신뢰·유능함 같은 성격 인상을 순식간에 읽지만, 그 판단은 표정·각도·맥락에 따라 크게 달라진다. 고정된 미의 등급보다 표현이 인상을 좌우한다.",
my:["'특정 얼굴형이 모델·방송에 유리하다'","업계는 다양한 얼굴을 원한다. 광고·드라마·런웨이·콘텐츠는 저마다 다른 캐릭터를 필요로 하고, 개성 있는 얼굴은 그 자체로 강력한 자산이다. 강점은 형태가 아니라 표현력에서 나온다."],
cs:[["모델","패션·광고 모델 중에는 정형화된 미인형이 아니라 강한 개성으로 기억되는 얼굴이 많다. 독특한 윤곽과 분위기가 곧 캐릭터가 된다."],
["방송","아나운서·리포터는 친근함과 신뢰가 핵심이다. 과하지 않은 메이크업, 또렷한 눈썹, 밝은 표정이 믿음직한 얼굴을 만든다."],
["오디션","연기 오디션에서는 얼굴로 감정을 표현하는 힘이 형태보다 중요하다. 같은 대사도 표정에 따라 전혀 다르게 읽힌다."],
["인플루언서","화면에 자주 보이는 얼굴은 친밀함으로 승부한다. 일관된 톤과 특유의 미소가 시그니처가 된다."]],
ws:[["내 얼굴의 매력 포인트 3가지",""],["강조하고 싶은 포인트와 연출 방향",""],["진로 목표 인상과 얼굴 연출","예: 친근함 → 밝은 눈썹과 미소"]],
ck:["얼굴 이미지가 표현으로 완성됨을 안다","내 매력 포인트 3가지를 말할 수 있다","얼굴형에 우열이 없음을 설명할 수 있다","헤어의 시선 유도·리듬 원리를 안다","메이크업의 세 축과 목적을 안다"],
sum:["얼굴 이미지는 고정된 미의 기준이 아니라 인상과 표현으로 완성된다","얼굴형에는 우열이 없으며 각 형은 고유한 매력을 가진다","헤어는 얼굴의 액자로 시선 유도와 리듬의 원리로 작동한다","메이크업의 핵심은 가리기가 아니라 균형과 생기다","표정이 얼굴 이미지의 마지막 완성이다"],
disc:["'예쁘다'와 '인상이 좋다'는 어떻게 다른가? 내 진로엔 어느 쪽이 중요할까?","한때 콤플렉스였지만 개성으로 볼 수 있는 부분이 있는가?","같은 얼굴이 헤어나 표정으로 달라 보인 경험을 나눠보자"],
mi:"매력 포인트로 시선을 모으는 헤어 또는 메이크업을 한 가지 시도해 비교",

{n:6,t:"체형 분석과 스타일링",s:"실루엣 · 시선 설계 · 다양성",
g:["스타일링이 교정이 아니라 연출임을 설명한다","실루엣·라인·비율의 원리를 설명한다","내 체형을 강점 중심으로 분석한다","진로에 맞는 스타일링을 제안한다"],
th:[
["교정이 아니라 연출","이 장의 전제를 분명히 하자. 스타일링은 체형을 고치거나 숨기는 일이 아니다. 모든 체형은 저마다의 매력을 가지며 우열이 없다.","우리가 다루는 것은 옷의 선·비율·색이라는 도구로 원하는 인상을 연출하고 강점으로 시선을 모으는 방법이다. 이 수업은 다이어트나 시술을 권하지 않으며 오직 '입는 법'과 '보이는 법'의 원리를 다룬다."],
["실루엣의 이해","실루엣은 옷이 만들어내는 몸의 외곽선이다. 스트레이트(I)는 위아래로 곧게 떨어져 깔끔하고 시크한 인상을, A라인은 아래로 퍼지며 사랑스럽고 활동적인 느낌을 준다.","X라인은 허리를 강조해 또렷한 균형을, 오버(O)는 여유 있는 볼륨으로 편안하고 트렌디한 분위기를 만든다. 어느 것이 옳다는 정답은 없고 연출하려는 인상에 따라 고르면 된다."],
["시선의 설계","스타일링의 핵심 원리는 시선의 설계다. 사람의 눈은 밝은 색, 포인트(벨트·액세서리), 수직선으로 자연스럽게 이동한다.","이를 이용하면 강조하고 싶은 부분으로 시선을 모을 수 있다. 또 상의와 하의를 나누는 가로 분할선의 위치를 조절하면 전체 비율의 리듬이 달라진다."],
["라인과 색의 착시","세로 선(스트라이프·롱 카디건·하이웨이스트)은 길고 곧은 느낌을, 가로 선과 볼륨은 넉넉하고 안정된 느낌을 준다.","색에도 성질이 있다. 밝고 따뜻한 색은 도드라져 시선을 끌고(진출), 어둡고 차가운 색은 차분히 가라앉는다(후퇴). 이는 좋고 나쁨이 아니라 '어떤 인상을 원하느냐'의 문제다. 핵심은 강조점을 하나로 모으는 것이다."],
["체형은 선의 경향으로","체형은 크기가 아니라 선의 경향으로 이해하면 강점이 잘 보인다. 직선 경향은 탄탄하고 정돈된 느낌, 곡선 경향은 부드럽고 화사한 곡선미, 프레임 경향은 여유 있고 시원한 골격감이 매력이다.","어떤 경향이든 핵심은 같다. 마음에 드는 부분으로 시선을 모으고 입었을 때 자신감이 생기는 선을 고르는 것. 자신감은 어떤 핏보다 강한 스타일링이다."]],
ev:"스타일링의 효과는 시지각과 착시의 원리를 옷에 적용한 것이다. 선의 방향, 분할, 색의 진출과 후퇴는 같은 대상도 다르게 보이게 만든다. 몸의 변화가 아니라 지각의 디자인이다.",
my:["'스타일링은 단점을 가리는 것'","스타일링은 강점으로 시선을 모으는 것이다. 가리기에 집중하면 위축되지만 살리기에 집중하면 표현이 커진다. 런웨이·커머셜·시니어·플러스사이즈 등 업계의 체형 다양성은 계속 넓어지고 있다. 다양함은 곧 기회다."],
cs:[["모델","런웨이에서 모델은 옷의 실루엣을 가장 잘 보여주는 선이 된다. 분야가 다양해지면서 저마다 다른 체형의 표현력이 모두 자산이 되고 있다."],
["방송","앉아서 진행하는 방송이 많아 상반신과 목·어깨 라인의 정돈이 중요하다. 깔끔한 네크라인이 신뢰감 있는 인상을 만든다."],
["오디션","과한 꾸밈보다 몸에 잘 맞고 움직임이 편한 옷이 강하다. 그 편안함이 자신감을 만들고 자신감이 좋은 인상으로 이어진다."],
["인플루언서","어울리는 실루엣과 색을 시그니처로 정해 반복하면 스타일 자체가 브랜드가 된다."]],
ws:[["내 체형(라인)의 강점 3가지",""],["입었을 때 자신감이 생기는 옷의 특징",""],["강조할 포인트와 시선 설계",""]],
ck:["스타일링이 연출임을 설명할 수 있다","실루엣 4가지를 구분한다","시선 유도의 도구를 안다","세로·가로 라인의 착시를 설명할 수 있다","내 체형을 강점 중심으로 분석했다"],
sum:["스타일링은 체형 교정이 아니라 옷으로 인상을 연출하는 시각 디자인이다","실루엣·라인·비율·색은 같은 몸도 다르게 보이게 하는 지각의 도구다","핵심은 강점으로 시선을 모으는 것이며 강조점은 하나로 모은다","모든 체형은 우열 없는 매력을 가지며 업계의 다양성은 넓어지고 있다","자신감이 생기는 선을 고르는 것이 어떤 규칙보다 강하다"],
disc:["'가리는 스타일링'과 '살리는 스타일링'은 마음가짐을 어떻게 다르게 만들까?","내가 입었을 때 자신감이 생기는 옷의 공통점은?","내 진로에서 시그니처로 고정하고 싶은 요소는?"],
mi:"자신감이 생기는 옷 한 벌을 골라 실루엣·라인·색이 만드는 인상 분석",
tm:[["실루엣","옷이 만드는 몸의 외곽선(I·A·X·O)"],["시선 설계","밝은 색·포인트·수직선으로 시선을 유도하는 것"],["비율 분할","상·하의 분할선 위치로 전체 리듬을 조절"],["진출·후퇴색","시선을 끄는 밝은 색과 가라앉는 어두운 색"],["시그니처 스타일","반복해 브랜드가 되는 나만의 요소"]]},

{n:7,t:"패션 코디네이션과 TPO",s:"드레스 코드 · 캡슐 워드로브",
g:["코디네이션과 TPO를 설명한다","코디네이션의 기본 원리를 설명한다","상황별 드레스 코드를 분석한다","진로 장면 코디를 기획한다"],
th:[
["조합의 기술","좋은 옷을 하나하나 갖췄는데도 막상 입으면 어울리지 않는 경험이 있을 것이다. 반대로 평범한 옷들인데 조합 하나로 세련돼 보이는 사람도 있다.","차이는 아이템이 아니라 코디네이션, 즉 조합의 기술에 있다. 코디네이션은 옷·소품·색을 하나의 일관된 메시지로 묶는 일이다. 질문은 늘 같다. '이 차림이 전하려는 메시지는 무엇인가?'"],
["TPO는 태도다","TPO는 시간(Time)·장소(Place)·상황(Occasion)의 머리글자다. 같은 옷도 언제 어디서 어떤 자리에서 입느냐에 따라 적절함이 달라진다.","TPO를 지킨다는 건 단순히 규칙을 따르는 게 아니라 그 자리를 존중한다는 태도를 보여주는 것이다. 그래서 TPO에 맞는 차림은 그 자체로 매너이자 신뢰의 신호가 된다."],
["코디네이션의 원리","첫째, 통일과 변화의 균형이다. 전체를 하나의 톤으로 묶되 한 가지 포인트로 단조로움을 깬다. 둘째, 배색이다. 베이스 색을 정하고 포인트 색을 더한다.","셋째, 비율이다. 상·하의 볼륨과 길이의 리듬을 맞춘다. 넷째, 포인트는 하나로. 강조가 여럿이면 시선이 흩어져 메시지가 흐려진다. 실전 공식은 베이스 7 : 포인트 3이다."],
["드레스 코드 스펙트럼","드레스 코드는 격식의 정도에 따라 스펙트럼을 이룬다. 포멀(정장·시상식), 세미포멀(재킷+슬랙스·방송·중요 면접), 비즈니스캐주얼(셔츠·니트·일반 면접), 캐주얼(티셔츠·데님·일상) 순이다.","자신의 진로 장면이 이 스펙트럼의 어디쯤인지 가늠하면 차림을 정하기 쉽다. 정장이 항상 유리한 것은 아니다. 캐주얼한 자리의 과한 격식은 오히려 부적절할 수 있다."],
["캡슐 워드로브와 디테일","서로 잘 어울리는 소수의 기본 아이템을 갖춰두면 적은 옷으로도 다양한 조합이 가능해진다. 이것이 캡슐 워드로브다.","완성도는 디테일에서 갈린다. 액세서리·가방·신발은 적은 면적으로 큰 인상을 만들지만 원칙은 절제다. 값비싼 소품보다 정돈된 디테일, 즉 청결과 핏이 훨씬 큰 신뢰를 준다."]],
ev:"애덤·갈린스키(2012) 착의 인지: 같은 흰 가운도 '의사 가운'이라는 의미가 부여될 때 착용자의 주의력과 수행이 향상되었다. 옷은 보는 사람뿐 아니라 입는 사람에게도 영향을 준다.",
my:["'비싸게 입어야 잘 입는 것'","완성도는 가격이 아니라 TPO·청결·핏에서 갈린다. 브랜드보다 자리에 맞는 차림과 정돈된 디테일이 훨씬 큰 신뢰를 만든다. 가진 옷으로도 충분히 좋은 조합을 만들 수 있다."],
cs:[["모델","룩북 촬영에서는 브랜드 콘셉트에 맞춰 여러 코디를 빠르게 소화한다. 평소 다양한 조합을 시도해본 사람일수록 현장 적응이 빠르다."],
["방송","스튜디오에는 대개 드레스 코드가 있다. 잔무늬나 형광색은 화면에서 번지므로 피하고 단정한 세미포멀이 기본이다."],
["오디션","과하지 않게, 그러나 또렷하게가 핵심이다. 옷이 주인공이 아니라 내가 주인공이 되도록 차림은 단정함으로 신뢰를 만든다."],
["인플루언서","채널의 톤에 맞춰 코디를 통일하면 썸네일만 봐도 채널이 떠오른다. 시그니처 아이템 하나를 반복하는 것도 좋은 전략이다."]],
ws:[["면접·오디션 코디",""],["무대·촬영 코디",""],["일상·SNS 코디",""]],
ck:["코디네이션이 조합의 기술임을 안다","TPO의 세 요소를 안다","TPO가 매너·신뢰의 신호임을 안다","드레스 코드 스펙트럼을 구분한다","베이스 7:포인트 3을 적용할 수 있다"],
sum:["코디네이션은 아이템을 하나의 일관된 메시지로 묶는 조합의 기술이다","TPO에 맞춘 차림은 그 자체로 매너이자 신뢰의 신호다","통일·변화·배색·비율과 '포인트는 하나로'가 기본 원리다","드레스 코드는 포멀에서 캐주얼까지의 스펙트럼이다","완성도는 가격이 아니라 청결·핏·절제된 디테일에서 갈린다"],
disc:["'비싸게 입기'와 '잘 입기'는 어떻게 다른가?","내 진로에서 가장 중요한 한 장면의 코디를 정한다면?","TPO를 어긴 차림이 인상을 해친 사례를 본 적 있는가?"],
mi:"가장 중요한 장면용 코디를 실제 옷장에서 한 벌 완성해보기",
tm:[["코디네이션","옷·소품·색을 하나의 메시지로 조합하는 기술"],["TPO","때·장소·상황에 맞춘 차림"],["드레스 코드","자리에 요구되는 격식의 기준"],["캡슐 워드로브","서로 잘 어울리는 소수의 기본 아이템 구성"],["착의 인지","옷이 입는 사람의 심리에도 영향을 주는 효과"]]},

{n:8,t:"표정·미소 트레이닝",s:"뒤센 미소 · 카메라 표정",
g:["표정이 인상에서 차지하는 비중을 설명한다","표정 근육과 뒤센 미소를 설명한다","기초 미소 트레이닝을 수행한다","카메라·무대 표정을 연출한다"],
th:[
["같은 사람, 다른 인상","같은 사람, 같은 옷, 같은 헤어인데도 사진 한 장에서 인상이 완전히 갈릴 때가 있다. 차이는 대개 표정이다.","굳은 표정은 좋은 스타일까지 가려버리고, 자연스러운 미소 하나는 평범한 컨디션을 단숨에 호감으로 바꾼다. 게다가 기쁨·놀람·슬픔 같은 기본 감정의 표정은 문화권을 넘어 비슷하게 읽힌다."],
["표정은 근육의 습관","많은 사람이 표정은 타고나는 것이라 여긴다. 하지만 얼굴에는 표정을 만드는 수십 개의 근육이 있고, 표정은 결국 이 근육들의 습관이다.","평소 잘 쓰지 않으면 굳고, 자주 쓰면 자연스러워진다. 그래서 표정에도 스트레칭과 반복 연습이 필요하다. 특히 입꼬리를 올리는 근육과 눈가를 움직이는 근육이 중요하다."],
["뒤센 미소","미소에도 종류가 있다. 입꼬리만 올라간 미소는 어딘가 어색하게 느껴지지만, 눈가까지 함께 웃는 미소는 진심으로 읽힌다.","이 눈가까지 번지는 진짜 미소를 뒤센 미소라 부른다. 입꼬리 근육과 눈둘레근이 함께 움직이는 것이 핵심이다. '눈이 웃어야 진짜 웃음'이라는 말은 여기서 나온다."],
["트레이닝의 세 부위","연습의 핵심은 세 부위다. 입꼬리를 좌우 균형 있게 올리고, 광대를 살짝 들어 올려 생기를 더하고, 눈가로 눈웃음을 만든다.","기초 연습으로는 '이~' 소리를 내며 입꼬리 올리기, 거울 앞에서 미소를 3초간 유지하기, 광대를 손가락으로 확인하며 올리기가 있다. 처음에는 어색하지만 반복하면 근육이 그 모양을 기억한다."],
["카메라와 무대에서는","카메라와 무대는 일상과 다르다. 렌즈와 조명 아래에서는 표정이 실제보다 약하게 전달되기 쉽다. 그래서 평소보다 한 톤 더 또렷하게 표현하는 감각이 필요하다.","사진과 영상도 다르다. 사진은 결정적 한 순간의 표정을, 영상은 자연스럽게 흐르는 표정을 요구한다. 거울이 아니라 카메라로 직접 찍어 확인하는 연습이 가장 효과적이다."]],
ev:"뒤센 미소는 입꼬리를 올리는 대협골근과 눈가의 눈둘레근이 함께 움직이는 미소로, 진정성 있는 즐거움의 신호로 확인된다. 참고로 '웃으면 기분이 좋아진다'는 표정 피드백 가설은 재현 연구에서 논쟁 중이다.",
my:["'표정 연습은 가식적이다'","연습은 진짜 표정을 편안하게 만드는 과정이다. 긴장으로 굳는 표정이야말로 어색하다. 충분히 연습된 미소는 오히려 자연스럽고 진정성 있게 보인다."],
cs:[["모델","모델에게 표정은 콘셉트의 언어다. 화사한 미소가 필요한 광고가 있고 절제된 무표정이 어울리는 화보가 있다. 의도대로 켜고 끌 수 있는 능력이 표현력이다."],
["방송","카메라가 켜지는 순간 자연스러운 미소로 시작하고 내용에 따라 톤을 조절한다. 오프닝 3초의 밝은 표정이 전체 인상을 좌우한다."],
["오디션","연기 오디션에서는 감정을 표정으로 표현하는 폭이 평가의 핵심이다. 같은 대사도 표정에 따라 전혀 다르게 읽힌다."],
["인플루언서","특유의 눈웃음이나 밝은 미소가 채널의 인상을 만든다. 자연스러우면서도 일관된 표정이 친밀감을 쌓는다."]],
ws:[["내 무표정의 인상","사진을 찍어 보고 느낀 점"],["미소 지을 때 눈가가 함께 웃는가?",""],["진로 장면별 필요한 표정",""]],
ck:["표정이 근육의 습관임을 안다","뒤센 미소를 설명할 수 있다","트레이닝 세 부위를 안다","'연습=가식'이 오해임을 설명할 수 있다","카메라에서 한 톤 더의 이유를 안다"],
sum:["표정은 인상의 핵심이며 기본 감정 표정은 문화를 넘어 통한다","표정은 근육의 습관이므로 반복 훈련으로 좋아진다","눈가까지 웃는 뒤센 미소가 진짜 미소로 읽힌다","트레이닝의 핵심 부위는 입꼬리·광대·눈가다","카메라와 무대에서는 한 톤 더 또렷한 표정이 필요하다"],
disc:["'눈이 웃지 않는 미소'를 느껴본 적 있는가? 무엇이 그렇게 느끼게 했을까?","내 진로에서 가장 자주 써야 할 표정은? 지금 그것이 자연스러운가?","표정 연습이 가식이 아니라 준비인 이유를 내 말로 설명해보자"],
mi:"매일 미소 트레이닝을 하고 첫날과 7일째 사진을 같은 조건에서 비교",
tm:[["뒤센 미소","눈가까지 함께 웃는 진정성 있는 미소"],["눈둘레근","눈가를 움직여 눈웃음을 만드는 근육"],["대협골근","입꼬리를 위로 올리는 대표적 미소 근육"],["표정 가동 범위","표현할 수 있는 표정의 폭"],["카메라 표정","조명·렌즈를 고려해 한 톤 더 연출한 표정"]]},

{n:9,t:"자세·바디라인·워킹",s:"정렬 · 워킹 5요소 · 동선",
g:["자세가 인상과 자신감에 미치는 영향을 안다","바른 자세의 정렬을 점검한다","모델 워킹의 기초를 연습한다","진로 장면의 동선을 설계한다"],
th:[
["말보다 먼저 보이는 것","무대 끝에서 걸어 나오는 단 몇 초. 표정도 의상도 자세히 보이기 전인데 사람들은 벌써 '분위기 있다' 혹은 '위축돼 보인다'를 느낀다.","그 첫 느낌의 대부분은 자세에서 온다. 펴진 어깨와 안정된 시선은 말 없이도 자신감을 전한다. 자세는 첫인상에서 말보다 먼저 보이는 강력한 비언어 신호다."],
["정렬이 핵심","바른 자세의 핵심은 정렬이다. 옆에서 보았을 때 귀·어깨·골반·복사뼈가 하나의 수직선 위에 오도록 하는 것이 기준이다.","정수리를 위로 살짝 당기듯, 어깨는 내려 펴고, 골반은 좌우 균형을 맞춘다. 중요한 것은 힘을 빼되 정렬은 유지하는 것이다. 바른 자세는 차렷처럼 경직된 상태가 아니라 편안하면서 곧은 상태다."],
["무게중심과 바디라인","바디라인은 몸이 만드는 선의 흐름이다. 무게중심을 어디에 두느냐에 따라 같은 사람도 안정적이거나 불안정해 보인다.","한쪽 발에 중심을 두고 다른 다리를 살짝 빼는 자세는 자연스러운 곡선과 안정감을 만든다. 사진과 무대에서 '라인이 산다'는 것은 결국 무게중심과 정렬이 잘 잡혔다는 뜻이다."],
["모델 워킹 5요소","워킹은 걷기가 아니라 보여주는 걸음이다. 첫째 시선은 정면 한 점에 안정적으로. 둘째 정렬은 머리부터 발끝까지 곧게.","셋째 보행선은 발이 거의 일직선(11자)에 가깝게. 넷째 보폭과 리듬은 일정한 속도와 간격으로. 다섯째 팔은 자연스럽게 흔들되 과하지 않게. 런웨이 워킹은 일상 걸음보다 또렷하고 절제된 리듬을 갖는다."],
["무대 동선","무대에서는 어디로 어떻게 움직이는가가 인상을 좌우한다. 입장·전진·포즈·턴·퇴장의 흐름을 미리 설계하면 긴장 속에서도 안정적으로 움직일 수 있다.","턴은 무게중심을 축에 두고 부드럽게, 포즈는 1~2초 멈춰 보여주는 시간을 준다. 시선 처리를 미리 정해두면 동선이 한결 또렷해진다."]],
ev:"넓고 곧은 자세가 관찰자에게 자신감·유능함의 신호로 읽힌다는 점은 비언어 연구에서 폭넓게 확인된다. 다만 '파워 포즈'가 본인의 호르몬을 바꾼다는 주장은 재현 연구에서 확인되지 않아 신중히 볼 필요가 있다.",
my:["'워킹은 키·다리 길이가 결정한다'","워킹은 훈련의 영역이다. 키와 무관하게 정렬·시선·리듬으로 완성되며, 자신감 있는 워킹은 신체 조건을 넘어선 무대 장악력을 만든다."],
cs:[["모델","런웨이에서 모델은 움직이는 선이 된다. 흔들림 없는 정렬과 일정한 리듬이 무대를 장악한다. 키가 크지 않아도 완성도로 강한 존재감을 내는 모델이 많다."],
["방송","앉거나 서서 진행하는 경우가 많아 상체 정렬이 핵심이다. 카메라가 길게 잡아도 무너지지 않는 유지력이 중요하다."],
["오디션","입장·인사·퇴장의 짧은 동선에서 첫인상이 결정된다. 퇴장까지 자세를 유지하는 것이 마지막 인상을 지킨다."],
["인플루언서","카메라 앞에 오래 머무는 콘텐츠일수록 자세가 인상을 좌우한다. 편안하면서 곧은 기본 자세를 정해두면 흔들리지 않는다."]],
ws:[["벽 테스트 결과","뒤통수·어깨·골반의 정렬 상태"],["내 진로 장면의 동선","입장 – 포즈 – 퇴장"],["워킹에서 가장 어려운 점",""]],
ck:["정렬 기준 네 지점을 안다","바른 자세가 경직이 아님을 안다","무게중심과 바디라인의 관계를 안다","워킹 5요소를 말할 수 있다","무대 동선을 설계했다"],
sum:["바른 자세는 자신감·신뢰·건강함의 인상을 만드는 비언어 신호다","정렬의 기준은 귀·어깨·골반·복사뼈의 수직선이다","바른 자세는 경직이 아니라 편안하고 곧은 상태다","워킹은 시선·정렬·보행선·리듬·팔의 다섯 요소로 완성된다","워킹은 신체 조건이 아니라 훈련의 영역이다"],
disc:["자세를 바꿨을 때 기분까지 달라진 경험이 있는가?","내 진로에서 자세와 워킹이 가장 중요한 장면은 어디인가?","'키가 작아서'라는 생각이 연습을 막은 적은 없는가? 그것은 사실인가?"],
mi:"벽 테스트로 자세를 점검하고 워킹 5요소를 매일 연습해 영상 비교",
tm:[["정렬","귀–어깨–골반–발이 수직선에 오는 자세 기준"],["무게중심","몸의 균형을 잡는 중심점"],["콘트라포스토","한쪽 발에 중심을 두어 곡선을 만드는 자세"],["11자 워킹","발을 거의 일직선으로 디디는 보행선"],["동선","무대에서 입장부터 퇴장까지의 경로"]]},

{n:10,t:"보이스·스피치 이미지",s:"복식호흡 · 발음 · 두괄식",
g:["음성이 인상에 미치는 영향을 설명한다","복식호흡과 발음 원리를 적용한다","말투·톤·속도를 분석한다","두괄식 자기소개를 설계한다"],
th:[
["목소리도 이미지다","전화로 처음 통화한 사람의 목소리만 듣고도 우리는 친절하다, 딱딱하다, 믿음직하다를 느낀다. 얼굴도 옷도 보이지 않는데 말이다.","목소리는 그만큼 빠르고 강력한 이미지 신호다. 음색 자체는 타고나도 발성·발음·말투·전달력은 훈련으로 분명히 좋아진다."],
["발성의 기초","좋은 발성은 큰 소리가 아니라 편하고 울리는 소리다. 핵심은 호흡이다.","어깨가 들리는 얕은 가슴호흡 대신 배가 부풀고 꺼지는 복식호흡을 쓰면 소리가 안정되고 오래 말해도 지치지 않는다. 여기에 입안과 가슴의 울림(공명)을 더하면 소리가 풍부해진다. 성대는 악기와 같아 무리하면 상하므로 충분한 수분과 워밍업이 중요하다."],
["발음과 전달력","아무리 좋은 목소리도 발음이 뭉개지면 전달되지 않는다. 또렷한 발음의 열쇠는 입모양이다. 모음의 입모양을 분명히 하고 받침과 끝음절을 흐리지 않는 것이 기본이다.","여기에 속도와 끊어 읽기가 더해진다. 중요한 말 앞뒤에 짧은 침묵을 두면 그 말이 또렷하게 들리고 신뢰감이 생긴다. 전달력은 결국 정확성과 명료함의 합이다."],
["말투와 톤","같은 문장도 톤·억양·속도·어미 처리에 따라 인상이 달라진다. 끝을 부드럽게 내리면 안정감이, 살짝 올리면 친근함이 생긴다.","말의 내용 외에 얹히는 이런 음성 요소를 파라랭귀지라 한다. 톤이 너무 단조로우면 지루하고 들쭉날쭉하면 산만하다. 핵심은 내용의 강약에 맞춰 톤에 리듬을 주는 것이다."],
["두괄식 스피치","짧은 자기소개나 멘트는 두괄식이 강하다. 핵심을 먼저 말하고 이유나 예시를 뒤에 붙이는 방식이다.","듣는 사람은 처음 몇 초에 집중하므로 첫 문장에 가장 하고 싶은 말을 둔다. 30초 자기소개라면 '이름 + 한 줄 콘셉트 → 강점 한 가지 → 마무리 인상'의 흐름이 깔끔하다. 길게 말하기보다 핵심을 또렷하게가 언제나 낫다."]],
ev:"매캘리어·토도로프·블랭(2014): 'hello' 한 마디(약 0.4초)만 듣고도 신뢰성·호감 같은 성격 인상이 형성되었다. 목소리는 얼굴만큼 강력한 첫인상 단서다.",
my:["'좋은 목소리는 낮고 굵은 목소리다'","좋은 목소리는 편안하고 또렷하며 진정성 있는 목소리다. 높든 낮든 자신의 음색을 살려 안정적으로 전달하는 것이 핵심이며, 다양한 음색은 저마다의 강점이 된다."],
cs:[["모델","모델도 인터뷰와 무대 인사 등 말하는 순간이 늘고 있다. 짧은 답변을 두괄식으로 준비해두면 어떤 질문에도 흔들리지 않는다."],
["방송","발성·발음·전달력은 기본기 중의 기본기다. 같은 원고도 끊어 읽기와 강조로 전혀 다르게 살아난다."],
["오디션","떨리는 목소리는 준비 부족으로, 또렷한 목소리는 자신감으로 읽힌다. 복식호흡으로 긴장을 다스리는 연습이 큰 힘이 된다."],
["인플루언서","또렷한 발음과 편안한 말투, 적절한 속도가 시청 지속 시간을 좌우한다. 말투 리듬이 채널의 개성이 되기도 한다."]],
ws:[["내 목소리의 강점과 개선점","녹음해서 들어본 뒤 작성"],["30초 자기소개 (두괄식)","이름+한 줄 콘셉트 → 강점 → 마무리"],["말할 때 고치고 싶은 습관",""]],
ck:["음성이 첫인상에 미치는 영향을 안다","복식호흡과 가슴호흡을 구분한다","또렷한 발음의 열쇠를 안다","끊어 읽기의 효과를 설명할 수 있다","두괄식 자기소개를 만들었다"],
sum:["목소리는 0.5초 만에 인상을 만드는 강력한 청각 신호다","좋은 발성은 큰 소리가 아니라 복식호흡에 기반한 울리는 소리다","전달력은 또렷한 발음과 끊어 읽기에서 나온다","톤·억양·어미 같은 파라랭귀지가 같은 말의 인상을 바꾼다","짧은 스피치는 두괄식으로 핵심을 먼저 말하는 것이 강하다"],
disc:["내 목소리의 강점은 무엇이고 가장 개선하고 싶은 점은?","'말 잘하는 사람'과 '전달력 있는 사람'은 같은가, 다른가?","내 진로에서 가장 자주 하게 될 말하는 장면은 무엇인가?"],
mi:"자기소개를 매일 녹음해 들으며 발음·속도·톤을 점검하고 비교",

{n:11,t:"매너·에티켓·태도 이미지",s:"따뜻함 · 인사 · 평판",
g:["태도가 신뢰와 평판에 미치는 영향을 설명한다","상황에 맞는 인사와 에티켓을 수행한다","현장·디지털 매너를 점검한다","나의 태도 원칙을 세운다"],
th:[
["태도가 인상을 완성한다","실력이 비슷한 두 사람이 있다. 한 사람은 늘 먼저 인사하고 시간을 지키며 스태프에게도 깍듯하다. 다른 사람은 실력은 좋지만 무뚝뚝하고 약속에 늦는다. 다음에 다시 부르고 싶은 사람은 누구일까.","외적 이미지가 첫인상을 열어준다면 태도는 그 인상을 신뢰로 바꾼다. 특히 모델테이너 업계는 좁고 평판은 빠르게 돈다."],
["따뜻함을 먼저 본다","사람은 타인을 따뜻함과 유능함이라는 두 축으로 평가하는데, 그중 따뜻함을 먼저 판단한다. '이 사람이 내 편인가'를 먼저 보는 것이다.","매너는 바로 이 따뜻함을 전하는 가장 빠른 신호다. 여기에 부정성 편향이 결합하면 무례나 지각 같은 따뜻함의 위반은 특히 치명적이 된다."],
["인사의 기술","인사는 모든 관계의 시작이며 가장 작지만 강력한 매너다. 좋은 인사에는 네 요소가 있다. 눈맞춤, 미소, 적절한 고갯짓, 그리고 밝은 말이다.","가벼운 목례는 스칠 때, 보통례는 일반적 인사, 정중례는 격식 있는 자리에 쓴다. 중요한 것은 각도보다 진심이 담긴 눈맞춤과 밝은 표정이다."],
["에티켓과 매너","두 말은 자주 섞여 쓰이지만 결이 다르다. 에티켓은 지켜야 할 규범이고, 매너는 그것을 행하는 방식과 태도다.","즉 에티켓이 '무엇을'이라면 매너는 '어떻게'다. 늦을 것 같을 때 미리 정중히 알리는 것이 매너다. 매너의 본질은 형식이 아니라 상대를 편하게 하는 배려에 있다."],
["현장과 디지털 매너","현장에는 공통된 기본이 있다. 약속보다 먼저 도착하기, 올바른 호칭과 존댓말, 먼저 인사하기, 그리고 스태프 존중이다. 카메라 뒤의 사람을 대하는 태도가 진짜 인성을 보여준다고들 말한다.","오늘날 태도 이미지는 온라인까지 이어진다. 댓글과 DM의 말투, 타인 사진을 올릴 때의 동의, 논란에 대한 신중함이 모두 사회적 이미지를 좌우한다. 한번 남은 기록은 오래 검색된다."]],
ev:"피스크 외(2002) 고정관념 내용 모형: 사람은 타인을 따뜻함과 유능함 두 축으로 평가하며, 특히 따뜻함을 먼저 그리고 더 무겁게 판단한다.",
my:["'실력만 있으면 태도는 부차적이다'","업계는 좁고 평판은 빠르게 돈다. 부정성 편향 탓에 태도의 실수는 오래 남고, 기회는 다시 부르고 싶은 사람에게 간다. 태도는 실력을 기회로 연결하는 다리다."],
cs:[["모델","긴 대기와 반복 촬영에도 밝은 태도를 유지하고 스태프와 잘 협업하는 모델은 다시 찾는다. '함께 일하기 좋은 사람'이라는 평판이 커리어를 만든다."],
["방송","방송은 수많은 스태프의 협업이다. 카메라가 꺼진 순간의 태도까지 보는 눈이 많다."],
["오디션","입·퇴장 인사, 대기 매너, 스태프를 대하는 태도가 실력과 함께 평가된다. 떨어져도 인상이 좋으면 다음 기회로 이어지기도 한다."],
["인플루언서","인플루언서의 자산은 신뢰다. 소통 매너와 약속 지키기, 논란에 대한 책임 있는 태도가 신뢰를 쌓는다."]],
ws:[["내가 지킬 태도 원칙 3가지",""],["고치고 싶은 습관 1가지",""],["내 SNS에서 점검할 디지털 매너",""]],
ck:["따뜻함–유능함 모형을 설명할 수 있다","인사의 네 요소를 안다","에티켓과 매너를 구분한다","현장 매너의 핵심을 안다","나의 태도 원칙을 세웠다"],
sum:["태도는 외적 이미지를 신뢰로 바꾸는 내적 이미지다","사람은 따뜻함을 먼저 평가하며 매너가 그 신호다","좋은 인사의 핵심은 각도보다 눈맞춤·미소·밝은 말이다","에티켓은 '무엇을', 매너는 '어떻게'이며 본질은 배려다","현장과 디지털 매너가 평판을 만들고 평판이 기회를 만든다"],
disc:["'카메라가 꺼진 순간의 태도'가 왜 중요하다고 생각하는가?","온라인에서의 말 한마디가 평판을 바꾼 사례를 본 적 있는가?","내가 꼭 지키고 싶은 태도 원칙 한 가지는 무엇인가?"],
mi:"'먼저 인사·시간 약속·스태프 존중' 중 하나를 골라 일주일 실천",
tm:[["에티켓","지켜야 할 사회적 규범(무엇을)"],["매너","규범을 행하는 방식과 태도(어떻게)"],["따뜻함–유능함","타인을 평가하는 두 축. 따뜻함을 먼저 판단"],["프로페셔널리즘","현장에서의 책임·협업·신뢰의 태도"],["평판","태도가 쌓여 형성되는 사회적 이미지"]]},

{n:12,t:"카메라·방송 이미지",s:"포토제닉 · 셀프 촬영",
g:["카메라 이미지가 실물과 다른 이유를 설명한다","각도·빛·표정으로 베스트 앵글을 찾는다","방송·셀프 촬영을 종합 연출한다","진로별 카메라 전략을 기획한다"],
th:[
["카메라는 거울과 다르다","거울 속 모습과 사진 속 모습이 달라 놀란 적이 있을 것이다. 카메라는 입체인 우리를 평면에 담고, 렌즈와 빛에 따라 같은 얼굴도 전혀 다르게 기록한다.","렌즈 특성에 따라 얼굴 비율이 다르게 보이고, 가까이서 찍을수록 가운데가 도드라지는 왜곡이 생긴다. 핵심은 '카메라는 거울과 다르다'는 사실을 받아들이고 그 특성에 맞춰 연출하는 것이다."],
["포토제닉의 다섯 요소","사진이 잘 받는다는 것은 타고난 운이 아니라 몇 가지 원리를 아는 기술이다. 첫째 각도, 얼굴과 몸을 정면보다 살짝 틀어 입체감을 준다.","둘째 시선, 렌즈나 의도한 방향으로 또렷하게. 셋째 빛, 얼굴을 향하는 부드러운 빛이 기본. 넷째 자세, 무게중심으로 라인을 살린다. 다섯째 표정, 8장의 자연스러운 미소다. 베스트 앵글은 여러 각도로 찍어 비교하며 찾는 것이다."],
["영상은 다르다","영상은 사진과 달리 움직임이 더해진다. 카메라를 의식한 시선 처리, 자연스러운 제스처, 그리고 정렬된 자세가 중요하다.","움직임은 크고 산만하기보다 절제되고 또렷하게가 좋다. 화면 프레임 안에서 자신이 어디에 어떻게 담기는지 의식하는 감각이 핵심이다."],
["방송 출연 이미지","방송은 모든 이미지 요소의 종합 무대다. 의상은 화면 금기(잔무늬·형광)를 피해 단정하게, 메이크업은 조명에 묻히지 않도록 또렷하게, 표정과 발성은 한 톤 더 살린다.","여기에 큐에 맞춘 시작과 상대의 말에 대한 자연스러운 리액션이 더해지면 '방송에 익숙한 사람'의 인상이 완성된다."],
["셀프 촬영의 기본","이제 카메라는 누구에게나 매일의 도구다. 기본은 세 가지다. 빛은 창을 마주 보는 자연광이 가장 쉽고, 앵글은 눈높이보다 약간 위가 무난하며, 배경은 단순하고 깔끔하게.","영상이라면 썸네일과 첫 3초가 시청을 좌우한다. 핵심 메시지나 매력 포인트를 첫 장면에 배치하는 의도된 설계가 필요하다."]],
ev:"사진은 한 순간을 고정하기 때문에 그 순간의 각도·표정·빛이 인상을 크게 좌우한다. 같은 사람도 어떤 컷을 고르느냐에 따라 신뢰와 매력의 인상이 달라진다.",
my:["'사진 잘 받는 건 타고나는 것'","포토제닉은 각도·빛·표정을 아는 기술이다. 누구나 여러 컷을 비교하며 자기 각도를 찾을 수 있고, 연습할수록 카메라 앞이 편해진다."],
cs:[["모델","짧은 시간에 다양한 포즈와 표정을 만들어야 한다. 자신의 베스트 앵글과 빛의 방향을 아는 모델은 같은 옷도 더 살린다."],
["방송","생방송은 안정감이 생명이다. 카메라가 길게 잡아도 흔들리지 않는 자세·표정·발성이 프로의 조건이다."],
["오디션","요즘 오디션은 셀프 테이프 제출이 흔하다. 빛·배경·앵글·소리를 스스로 세팅하는 능력이 곧 경쟁력이다."],
["인플루언서","일관된 화면 톤, 매력적인 썸네일, 첫 3초의 후킹이 채널의 성패를 가른다. 자신만의 촬영 세팅을 공식으로 만들어두면 안정된다."]],
ws:[["내 베스트 앵글","얼굴 각도 / 카메라 높이 / 빛의 방향"],["콘텐츠 첫 3초 설계",""],["셀프 촬영 세팅 체크","빛·배경·소리 점검 결과"]],
ck:["카메라와 실물의 차이를 설명할 수 있다","포토제닉 다섯 요소를 안다","내 베스트 앵글을 찾았다","방송 의상의 화면 금기를 안다","셀프 촬영의 기본 세 가지를 안다"],
sum:["카메라는 입체를 평면에 담으므로 실물과 다른 별도의 기술이 필요하다","포토제닉은 각도·시선·빛·자세·표정을 아는 기술이다","영상은 절제되고 또렷한 움직임과 시선 처리가 핵심이다","방송 이미지는 의상·메이크업·표정·발성이 종합되는 무대다","셀프 촬영은 빛·앵글·배경이 기본이며 첫 3초가 시청을 좌우한다"],
disc:["거울 속 나와 사진 속 나의 차이를 느낀 경험을 나눠보자. 왜 그럴까?","내가 본 '잘 만든 첫 3초' 영상은 무엇이 좋았는가?","내 진로에서 카메라를 가장 많이 쓰는 장면은 무엇인가?"],
mi:"여러 각도·빛에서 촬영해 베스트 앵글을 찾고 30초 셀프 영상 제작",
tm:[["포토제닉","각도·빛·표정으로 사진을 살리는 기술"],["앵글","피사체를 담는 카메라의 각도와 높이"],["렌즈 왜곡","초점거리·거리에 따라 비율이 달라 보이는 현상"],["셀프 테이프","오디션용으로 직접 촬영해 제출하는 영상"],["썸네일","영상의 대표 이미지로 첫 클릭을 좌우"]]},

{n:13,t:"퍼스널 브랜딩과 SNS 이미지",s:"콘셉트 · 일관성 · 콘텐츠 기둥",
g:["퍼스널 브랜딩과 일관성의 원리를 설명한다","브랜드 콘셉트를 설정한다","SNS 채널 전략을 수립한다","콘텐츠 기둥과 스토리를 설계한다"],
th:[
["브랜드는 일관된 약속","어떤 이름을 들으면 색깔·분위기·이야기가 한꺼번에 떠오르는 사람이 있다. 반대로 자주 보지만 무엇을 하는 사람인지 흐릿한 사람도 있다.","차이는 퍼스널 브랜드의 유무다. 브랜드란 사람들의 머릿속에 남는 일관된 인상과 약속이다. 1~12장에서 익힌 요소들이 하나로 묶일 때 비로소 브랜드가 된다."],
["콘셉트 네 요소","브랜드의 출발점은 콘셉트다. 첫째 핵심 키워드 세 개(3장의 목표 이미지), 둘째 타깃(누구에게 보여줄 것인가), 셋째 차별점(나만의 강점), 넷째 한 줄 정체성이다.","'편안한 에너지로 일상을 응원하는 라이프스타일 크리에이터'처럼 한 문장으로 자신을 설명할 수 있어야 한다. 이 문장이 없으면 콘텐츠도 방향을 잃는다."],
["일관성이 신뢰를 만든다","브랜드의 힘은 일관성에서 나온다. 외모·말투·콘텐츠·태도라는 모든 접점에서 같은 메시지가 반복될 때 사람들은 그것을 정체성으로 기억한다.","특히 비주얼 아이덴티티(시그니처 컬러, 톤앤매너, 반복되는 스타일)를 정해두면 멀리서도 알아본다. 일관성은 단조로움이 아니라 신뢰의 반복이다."],
["SNS 채널 전략","플랫폼마다 결이 다르다. 사진 중심, 긴 영상, 짧은 영상은 각각 어울리는 콘텐츠가 다르다.","자신의 강점과 진로에 맞는 플랫폼을 골라 채널 콘셉트를 분명히 하고 업로드의 일관성을 지키는 것이 시작이다. 여러 곳에 흩어지기보다 한 곳을 또렷하게 키우는 편이 낫다."],
["콘텐츠 기둥과 스토리","좋은 채널에는 콘텐츠 기둥이 있다. 콘셉트를 떠받치는 2~3개의 핵심 주제를 정해 그 안에서 콘텐츠를 만드는 것이다.","단발 콘텐츠보다 쌓이는 이야기가 사람을 모은다. 성장 과정, 도전, 일상의 진솔함 같은 스토리는 팔로워를 구경꾼에서 응원하는 사람으로 바꾼다. 핵심은 진정성과 꾸준함이다."]],
ev:"톰 피터스(1997) 'The Brand Called You': 이제 개인도 기업처럼 정체성·차별점·일관성으로 자신을 관리하는 시대라는 통찰이 퍼스널 브랜딩의 출발점이 되었다.",
my:["'브랜딩은 팔로워 수와 화려한 연출'","핵심은 숫자가 아니라 일관되고 신뢰가는 정체성이다. 꾸며낸 이미지는 오래가지 못한다. 진짜 강점을 또렷하게 반복하는 작은 브랜드가 가장 강하다."],
cs:[["모델","SNS는 움직이는 포트폴리오다. 일관된 톤의 화보·비하인드·일상을 쌓으면 캐스팅 담당자가 그 채널에서 분위기를 읽는다."],
["방송","SNS는 나를 알리는 채널이자 말하기 연습장이다. 또렷한 전달과 신뢰감 있는 톤을 콘텐츠로 보여주면 그 자체가 역량의 증거가 된다."],
["오디션","어떤 캐릭터와 강점을 가진 사람인지가 분명할수록 기억된다. 연습과 도전 과정을 진솔하게 쌓으면 성실함이라는 브랜드가 만들어진다."],
["인플루언서","퍼스널 브랜딩이 곧 직업이다. 콘셉트·기둥·비주얼·업로드 일관성이 채널의 성패를 가른다."]],
ws:[["나의 한 줄 정체성",""],["나만의 차별점(USP)",""],["콘텐츠 기둥 2~3개",""]],
ck:["퍼스널 브랜딩을 설명할 수 있다","콘셉트 네 요소를 안다","일관성이 신뢰를 만드는 이유를 안다","콘텐츠 기둥의 개념을 안다","한 줄 정체성을 정했다"],
sum:["퍼스널 브랜딩은 흩어진 요소를 하나의 일관된 정체성으로 묶는 일이다","콘셉트는 키워드·타깃·차별점·한 줄 정체성으로 압축된다","모든 접점의 일관성이 신뢰를 만든다","SNS는 한 곳을 또렷하게 키우는 편이 낫다","콘텐츠 기둥과 진정성 있는 스토리가 팔로워를 팬으로 바꾼다"],
disc:["내가 '팬'이 된 인물이나 채널의 브랜드는 무엇이 일관됐는가?","팔로워가 적어도 브랜드가 강한 사람의 예를 들 수 있는가?","내 한 줄 정체성을 지금 말한다면 무엇인가?"],
mi:"브랜드 콘셉트와 채널 콘텐츠 기둥 3개를 기획서로 정리하기",
tm:[["퍼스널 브랜드","머릿속에 남는 일관된 정체성과 약속"],["USP","남과 구별되는 나만의 차별점"],["비주얼 아이덴티티","시그니처 컬러·톤 등 일관된 시각 정체성"],["콘텐츠 기둥","채널을 떠받치는 2~3개 핵심 주제"],["톤앤매너","콘텐츠 전반의 일관된 분위기와 표현 방식"]]},

{n:14,t:"오디션·포트폴리오 전략",s:"첫 몇 초 · 포트폴리오 4원칙",
g:["오디션이 종합 평가임을 심사자 관점에서 설명한다","앞 장의 요소를 통합해 준비한다","프로필·포트폴리오를 구성한다","셀프 테이프를 제작·정리한다"],
th:[
["짧은 시간의 종합 평가","오디션장의 문이 열리고 닫히기까지는 길어야 몇 분. 그 짧은 시간에 심사위원은 외모·표정·자세·목소리·태도를 한꺼번에 읽는다.","심사위원은 제한된 시간에 잠재력을 가늠해야 하므로 첫인상과 강점이 또렷한 사람에게 눈길이 간다. 중요한 것은 완벽함이 아니라 가능성과 진정성이다."],
["준비는 통합이다","오디션 준비는 앞 장들의 종합이다. 자기소개는 두괄식으로, 표정은 자연스러운 미소로, 입·퇴장은 곧은 자세와 워킹으로, 의상은 TPO에 맞게 준비한다.","여기에 긴장 관리가 더해진다. 복식호흡과 충분한 리허설은 떨림을 줄이는 가장 확실한 방법이다. '준비된 만큼 떨지 않는다'는 말은 사실이다."],
["프로필 사진","프로필은 서류 속 첫인상이다. 보통 정면·측면·전신을 포함하며, 과한 보정보다 '가장 좋은 컨디션의 진짜 나'를 담는 것이 핵심이다.","실물과 사진의 괴리가 크면 오히려 신뢰를 잃는다. 모델의 경우 키·사이즈 등 기본 정보를 사진과 함께 담은 컴카드를 만들며, 깔끔한 구성과 일관된 톤이 전문성을 보여준다."],
["포트폴리오 네 원칙","포트폴리오는 나를 증명하는 모음집이다. 첫째 베스트 위주로, 많이가 아니라 잘된 것만. 둘째 다양성, 여러 분위기와 콘셉트를 보여준다.","셋째 일관성, 전체를 관통하는 톤이 있어야 한다. 넷째 스토리, 첫 장과 끝 장으로 흐름을 만든다. 사진이 많을수록 좋은 것이 아니라 잘 고른 소수가 강하다. 요즘은 링크 하나로 보여주는 디지털 포트폴리오도 필수다."],
["셀프 테이프와 제출 매너","이제 많은 오디션이 셀프 테이프로 시작된다. 12장에서 익힌 대로 빛·배경·앵글·소리를 깔끔하게 세팅하고 또렷한 전달로 찍는다.","제출할 때는 파일 이름과 형식을 요구사항에 맞추고 마감을 지킨다. 이것도 태도 평가의 일부다. 온라인 지원에서는 자료의 정리와 매너가 곧 프로페셔널리즘의 신호가 된다."]],
ev:"앰바디·로젠탈의 씬 슬라이싱 연구: 수십 초의 짧은 관찰만으로도 사람은 꽤 정확한 인상을 형성한다. 오디션의 첫 몇 초가 중요한 이유다. 다만 빠른 판단에는 편향도 함께 따른다.",
my:["'포트폴리오는 많을수록, 보정이 셀수록 유리하다'","베스트 컷과 일관된 콘셉트가 양보다 강하다. 과한 보정은 실물과의 괴리로 신뢰를 깬다. 자연스러운 진짜 강점이 가장 설득력 있다."],
cs:[["모델","캐스팅은 컴카드·포트폴리오·실물의 일관성을 본다. 사진 속 분위기와 실제가 일치하면 신뢰가 간다. 워킹 영상이 더해지면 더 강하다."],
["방송","카메라 테스트와 원고 전달이 핵심이다. 또렷한 발성과 안정된 자세, 셀프 테이프의 깔끔한 완성도가 평가된다."],
["오디션","자기소개와 지정·자유 연기로 이뤄진다. 짧은 시간에 감정 표현의 폭과 준비된 태도를 보여주는 것이 관건이다."],
["인플루언서","브랜드 협업이나 소속사 지원에서는 SNS 채널 자체가 포트폴리오다. 대표 영상 몇 개가 곧 실력의 증거다."]],
ws:[["나의 30초 자기소개 완성본",""],["포트폴리오 베스트 컷 구성",""],["오디션 전 긴장 관리 방법",""]],
ck:["오디션이 종합 평가임을 안다","씬 슬라이싱과 첫 몇 초의 관계를 안다","프로필 사진의 원칙을 안다","포트폴리오 네 원칙을 안다","셀프 테이프 제작·제출 매너를 안다"],
sum:["오디션은 짧은 시간의 종합 평가이며 첫 몇 초가 결정적이다","준비는 자기소개·표정·자세·코디·긴장 관리의 통합이다","프로필은 과한 보정보다 가장 좋은 컨디션의 진짜 나를 담는다","포트폴리오는 베스트·다양성·일관성·스토리로 구성한다","셀프 테이프는 깔끔한 세팅과 제출 매너까지가 평가다"],
disc:["'준비된 만큼 떨지 않는다'에 동의하는가? 내 경험은 어떤가?","과한 보정이 단기적으로 유리해 보여도 장기적으로 불리한 이유는?","내 진로의 포트폴리오에 꼭 들어가야 할 베스트 컷은 무엇인가?"],
mi:"30초 셀프 테이프를 촬영하고 포트폴리오 구성안을 작성하기",
tm:[["씬 슬라이싱","짧은 노출로 꽤 정확한 인상을 형성하는 현상"],["컴카드","사진과 기본 정보를 담은 모델 소개 카드"],["포트폴리오","베스트 작업을 모아 역량을 증명하는 모음집"],["셀프 테이프","오디션용으로 직접 촬영해 제출하는 영상"],["프로필 사진","정면·측면·전신 등 자신을 소개하는 기본 사진"]]},

{n:15,t:"종합 실습: 나만의 이미지 컨설팅",s:"통합 · 기획안 · 발표",
g:["1~14장을 하나의 기획안으로 통합한다","요소별 전략과 로드맵을 설계한다","두괄식과 실연으로 발표한다","동료 피드백으로 점검·보완한다"],
th:[
["통합이 목표","한 학기 동안 이미지의 개념에서 출발해 컬러·얼굴·체형·코디, 표정·자세·보이스, 태도·카메라, 브랜딩·오디션까지 하나씩 익혔다. 이제 마지막 단계다.","지금까지 배운 요소들은 따로 있을 때보다 하나의 일관된 콘셉트로 묶일 때 훨씬 강력하다. 컬러·표정·자세·보이스·태도가 같은 메시지를 전할 때 비로소 '그 사람다움'이 완성된다."],
["기획안 다섯 부분","좋은 이미지 기획안은 다섯 부분으로 이뤄진다. ① 자기 진단(강점·전환 대상) ② 목표 이미지(키워드와 타깃) ③ 요소별 전략(컬러부터 카메라까지) ④ 브랜딩·SNS ⑤ 실행 로드맵이다.","이 앱의 '나' 탭에서는 지금까지 쓴 워크시트가 이 다섯 부분의 초안으로 자동 조립된다. 복사해서 다듬으면 그대로 과제와 발표 자료가 된다."],
["발표도 실연이다","발표는 한 학기의 종합 실연이다. 구성은 두괄식으로 — '저는 이런 이미지를 목표로 합니다'를 먼저 밝히고 근거를 잇는다.","비주얼 자료는 핵심만 담아 깔끔하게, 시간은 약속을 지킨다. 무엇보다 발표하는 순간의 표정·자세·보이스·태도가 곧 평가의 일부다. 말로 설명한 이미지를 몸으로 보여주는 자리다."],
["동료 피드백","발표 후의 동료 피드백은 3장의 '보이지 않는 창'을 줄이는 좋은 기회다. 피드백은 사람이 아니라 발표와 전략에 대해, 비난이 아니라 관찰과 제안으로 주고받는다.","받은 피드백은 방어하지 말고 듣고, 고맙다고 말하며, 기획안 보완에 반영한다. 나를 가장 빠르게 성장시키는 것은 내가 보지 못한 정보다."],

const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('on'),1700)}
function chDone(n){const c=CH[n-1];const ck=S.chk[n]||[];return ck.filter(Boolean).length>=c.ck.length}
function progress(){let d=0;CH.forEach(c=>{if(chDone(c.n))d++});return Math.round(d/CH.length*100)}
function wsCount(){let k=0;for(const x in S.ws){if(S.ws[x]&&S.ws[x].trim())k++}return k}
let view={tab:'home',ch:null,sub:'theory',quiz:null,train:null};

function home(){
  const p=progress(),C=2*Math.PI*64,off=C-C*p/100;
  const next=CH.find(c=>!chDone(c.n))||CH[14];
  const msg=p===0?"첫 장을 열면 무대 조명이 켜집니다.":p<40?`지금 <b>${p}%</b>. 조명이 켜지는 중입니다.`:p<100?`<b>${p}%</b> 도달. 남은 장을 마치면 기획안이 완성됩니다.`:"<b>전 과정 완료.</b> 이제 발표할 차례입니다.";
  let h=`<div class="wrap">
  <div class="top"><div class="eyebrow">영남이공대학교 · 모델테이너과 · 정채연 교수</div><h1>이미지메이킹 스테이지</h1></div>
  <div class="spot">
    <div class="ring">
      <svg width="152" height="152" style="transform:rotate(-90deg)"><circle cx="76" cy="76" r="64" stroke="#3D3350" stroke-width="10" fill="none"/>
      <circle cx="76" cy="76" r="64" stroke="#E9C46A" stroke-width="10" fill="none" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .8s"/></svg>
      <div class="val"><div class="pct num">${p}<span>%</span></div><div class="lab">한 학기 진도</div></div>
    </div>
    <div class="msg">${msg}</div>
  </div>
  <div class="stat">
    <div><b class="num">${CH.filter(c=>chDone(c.n)).length}</b><small>완료한 장</small></div>
    <div><b class="num">${wsCount()}</b><small>작성한 워크시트</small></div>
    <div><b class="num">${S.quiz.done?Math.round(S.quiz.right/S.quiz.done*100):0}<span style="font-size:14px">%</span></b><small>퀴즈 정답률</small></div>
  </div>
  <div class="sect"><h2>이어서 학습</h2></div>
  <button class="chap now" onclick="openCh(${next.n})" style="margin-bottom:0">
    <div class="no num">${next.n}</div>
    <div class="t"><b>${next.t}</b><small>${next.s}</small></div><div class="arrow">›</div></button>
  <div class="card mission"><h3>오늘의 실전 미션</h3><p>${next.mi}</p></div>
  <div class="sect"><h2>런웨이 · 15장</h2><span class="more" onclick="go('book')">전체 보기</span></div>`;
  CH.slice(0,4).forEach(c=>{h+=chapRow(c)});
  h+=`<div style="height:22px"></div></div>`;
  return h;
}
function chapRow(c){
  const done=chDone(c.n),cur=!done&&(c.n===1||chDone(c.n-1));
  return `<button class="chap ${done?'done':''} ${cur?'now':''}" onclick="openCh(${c.n})">
    <div class="no num">${done?'✓':c.n}</div>
    <div class="t"><b>${c.t}</b><small>${c.s}</small></div><div class="arrow">›</div></button>`;
}

function book(){
  let h=`<div class="wrap"><div class="top"><div class="eyebrow">TEXTBOOK</div><h1>교재 · 15장</h1></div>
  <p style="font-size:15.5px;margin:8px 0 16px">체크리스트를 모두 채우면 그 장이 완료됩니다.</p>`;
  CH.forEach(c=>{h+=chapRow(c)});
  h+=`<div style="height:22px"></div></div>`;return h;
}
function chapter(){
  const c=CH[view.ch-1],sub=view.sub;
  let h=`<div class="wrap"><div class="backbar"><button onclick="go('book')">‹ 교재</button>
    <span>${c.n}장 / 15</span></div>
    <h1 style="font-size:24px;font-weight:800">${c.t}</h1>
    <p style="font-size:15px;margin:5px 0 14px;color:#6B6175">${c.s}</p>
    <div class="tabs">
      <button class="tab ${sub==='theory'?'on':''}" onclick="setSub('theory')">이론</button>
      <button class="tab ${sub==='case'?'on':''}" onclick="setSub('case')">현장 사례</button>
      <button class="tab ${sub==='ws'?'on':''}" onclick="setSub('ws')">워크시트</button>
      <button class="tab ${sub==='diag'?'on':''}" onclick="setSub('diag')">자기진단</button>
      <button class="tab ${sub==='check'?'on':''}" onclick="setSub('check')">정리·체크</button>
    </div>`;
  if(sub==='theory'){
    h+=`<div class="card"><h3>학습목표</h3>`;
    c.g.forEach((g,i)=>h+=`<div class="goal"><i class="num">${i+1}</i><span>${g}</span></div>`);
    h+=`</div><div class="theory">`;
    c.th.forEach(t=>{h+=`<h4>${t[0]}</h4>`;for(let i=1;i<t.length;i++)h+=`<p>${t[i]}</p>`});
    h+=`</div><div class="box ev"><b>학술 근거</b><p>${c.ev}</p></div>
      <div class="box my"><b>흔한 오해 바로잡기</b><p>✕ "${c.my[0]}"</p><p>○ ${c.my[1]}</p></div>
      <div class="card mission"><h3>실전 미션</h3><p>${c.mi}</p></div>
      <button class="btn" onclick="setSub('case')">현장 사례 보기</button>`;
  }
  if(sub==='case'){
    h+=`<p style="font-size:15.5px;margin-bottom:6px">네 가지 진로에서 이 장의 내용이 어떻게 쓰이는지 봅시다.</p>`;
    c.cs.forEach(x=>h+=`<div class="case"><b>${x[0]}</b><p>${x[1]}</p></div>`);
    h+=`<div class="card"><h3>토론해 봅시다</h3>`;
    c.disc.forEach((d,i)=>h+=`<div class="goal"><i class="num">${i+1}</i><span>${d}</span></div>`);
    h+=`</div><button class="btn" onclick="setSub('ws')">워크시트 작성하기</button>`;
  }
  if(sub==='ws'){
    h+=`<p style="font-size:15.5px;margin-bottom:4px">적으면 자동 저장되고, '나' 탭의 이미지 기획안에 자동으로 담깁니다.</p>`;
    c.ws.forEach((w,i)=>{
      const k=`${c.n}-${i}`,v=S.ws[k]||'';
      h+=`<div class="field"><label>${w[0]}</label>
        <textarea id="ws_${k}" placeholder="${w[1]||'자유롭게 적어보세요'}" oninput="saveWs('${k}',this.value)">${esc(v)}</textarea>
        <div class="saved" id="sv_${k}"></div></div>`;
    });
    h+=`<button class="btn ghost" onclick="setSub('check')">정리·체크로 이동</button>`;
  }
  if(sub==='diag'){
    const d=S.diag[String(c.n)]||[];
    const sum=d.reduce((a,b)=>a+(b||0),0);
    h+=`<div class="card"><h3>지금의 나 점검</h3>
      <p style="margin:0 0 6px;font-size:15px">정답은 없습니다. 학기 말에 다시 보면 성장이 보입니다. (1 전혀 아니다 ~ 5 매우 그렇다)</p>`;
    DIAG.forEach((q,i)=>{
      h+=`<div class="dq"><p>${i+1}. ${q}</p><div class="scale">`;
      for(let v=1;v<=5;v++)h+=`<button class="${d[i]===v?'on':''}" onclick="setDiag(${c.n},${i},${v})">${v}</button>`;
      h+=`</div></div>`;
    });
    h+=`<div style="text-align:center;margin-top:16px"><div class="num" style="font-size:32px;font-weight:800;color:#8A6410">${sum}<span style="font-size:16px;color:#6B6175"> / 30</span></div>
      <p style="margin:4px 0 0;font-size:15px">${sum>=25?'이미 자산으로 쓰고 있습니다. 더 정교하게 다듬어 봅시다.':sum>=18?'기본기는 충분합니다. 원리를 더해 봅시다.':sum>0?'지금부터 익히면 됩니다. 출발점일 뿐입니다.':'문항을 눌러 점수를 매겨보세요.'}</p></div></div>`;
  }
  if(sub==='check'){
    const ck=S.chk[c.n]||[];
    h+=`<div class="card"><h3>핵심 요약</h3>`;

let tState=null,tTimer=null;
function startTrain(id){
  const t=TRAIN.find(x=>x.id===id);
  tState={t,rep:1,step:0,left:t.steps[0][1],run:true};
  view.train=id;render();tick();
}
function tick(){
  clearInterval(tTimer);
  tTimer=setInterval(()=>{
    if(!tState||!tState.run)return;
    tState.left--;
    if(tState.left<=0){
      const t=tState.t;tState.step++;
      if(tState.step>=t.steps.length){tState.step=0;tState.rep++}
      if(tState.rep>t.rep){finishTrain();return}
      tState.left=t.steps[tState.step][1];
    }
    updT();
  },1000);
}
function updT(){
  if(!tState)return;
  const b=$('tbig'),c=$('tcue'),s=$('tsub');
  if(!b)return;
  b.textContent=tState.left;
  c.textContent=tState.t.steps[tState.step][0];
  s.textContent=`${tState.rep} / ${tState.t.rep} 세트`;
}
function finishTrain(){
  clearInterval(tTimer);
  const id=tState.t.id;S.train[id]=(S.train[id]||0)+1;save();
  tState=null;view.train=null;render();toast('훈련 완료. 잘했습니다.');
}

function startQuiz(mode){
  let pool;
  if(mode==='mid')pool=QUIZ.filter(q=>q.c<=7);
  else if(mode==='fin')pool=QUIZ.filter(q=>q.c>=8);
  else if(mode==='wrong')pool=S.quiz.wrong.map(i=>QUIZ[i]).filter(Boolean);
  else pool=QUIZ.slice();
  pool=pool.map(q=>({q,i:QUIZ.indexOf(q)})).sort(()=>Math.random()-.5);
  if(mode==='all')pool=pool.slice(0,10);
  if(!pool.length){toast('풀 문제가 없습니다');return}
  view.quiz={pool,i:0,pick:null,shown:false,right:0};render();window.scrollTo(0,0);
}
function quizRun(){
  const q=view.quiz;
  if(q.i>=q.pool.length){
    const r=Math.round(q.right/q.pool.length*100),C=2*Math.PI*64;
    return `<div class="wrap"><div class="top"><h1>결과</h1></div>
    <div class="spot"><div class="ring"><svg width="152" height="152" style="transform:rotate(-90deg)"><circle cx="76" cy="76" r="64" stroke="#3D3350" stroke-width="10" fill="none"/>
    <circle cx="76" cy="76" r="64" stroke="#E9C46A" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C-C*r/100}"/></svg>
    <div class="val"><div class="pct num">${r}<span>%</span></div><div class="lab">${q.right} / ${q.pool.length} 정답</div></div></div>
    <div class="msg">${r>=80?'훌륭합니다. 개념이 잡혀 있습니다.':r>=60?'좋습니다. 오답노트만 다시 보면 됩니다.':'해설을 다시 읽어보면 금방 올라갑니다.'}</div></div>
    <button class="btn" onclick="view.quiz=null;render()">퀴즈 홈으로</button>
    ${S.quiz.wrong.length?`<button class="btn dark" onclick="startQuiz('wrong')">오답노트 풀기 (${S.quiz.wrong.length})</button>`:''}
    <div style="height:22px"></div></div>`;
  }
  const it=q.pool[q.i],d=it.q,pct=Math.round(q.i/q.pool.length*100);
  let h=`<div class="wrap"><div class="backbar"><button onclick="view.quiz=null;render()">‹ 나가기</button></div>
  <div class="bar"><i style="width:${pct}%"></i></div>
  <div class="qmeta"><span>${q.i+1} / ${q.pool.length}</span><span>${d.c}장</span></div>
  <h2 style="font-size:19px;font-weight:800;margin-bottom:16px;line-height:1.5">${d.q}</h2>`;
  d.o.forEach((o,i)=>{
    let cl='opt';
    if(q.shown){if(i===d.a)cl+=' right';else if(i===q.pick)cl+=' wrong'}
    else if(q.pick===i)cl+=' pick';
    h+=`<button class="${cl}" onclick="pickQ(${i})">${['①','②','③','④'][i]} ${o}</button>`;
  });
  if(q.shown)h+=`<div class="expl"><b>${q.pick===d.a?'정답입니다':'오답입니다'}</b> · ${d.e}</div>
    <button class="btn" onclick="nextQ()">${q.i+1>=q.pool.length?'결과 보기':'다음 문제'}</button>`;
  h+=`<div style="height:22px"></div></div>`;return h;
}
function pickQ(i){
  const q=view.quiz;if(q.shown)return;
  q.pick=i;q.shown=true;
  const it=q.pool[q.i],ok=i===it.q.a;
  if(ok)q.right++;
  S.quiz.done++;if(ok)S.quiz.right++;
  const wi=S.quiz.wrong.indexOf(it.i);
  if(!ok&&wi<0)S.quiz.wrong.push(it.i);
  if(ok&&wi>=0)S.quiz.wrong.splice(wi,1);
  save();render();
}
function nextQ(){const q=view.quiz;q.i++;q.pick=null;q.shown=false;render();window.scrollTo(0,0)}

      <p style="font-size:14.5px;margin:0 0 8px">카카오톡으로 받은 코드를 여러 줄 한꺼번에 붙여 넣어도 됩니다. 같은 학번은 최신 것으로 갱신됩니다.</p>
      <textarea class="inp" id="pastebox" style="min-height:96px;line-height:1.5" placeholder="IMG|홍길동|20250101|60|9|24|30|80|7/19 14:20"></textarea>
      <button class="btn sm" onclick="addCodes()">명단에 등록하기</button></div>`;
  if(PROF.loading)h+=`<div class="empty">불러오는 중…</div>`;
  else if(!rows.length)h+=`<div class="empty">아직 등록된 학생이 없습니다.<br>학생에게 '나 → 진도 제출하기 → 제출 코드 복사'를 안내해 주세요.</div>`;
  else{
    const n=rows.length,avg=Math.round(rows.reduce((a,b)=>a+(b.p||0),0)/n),fin=rows.filter(r=>(r.p||0)>=100).length;
    h+=`<div class="stat"><div><b class="num">${n}</b><small>등록 인원</small></div>
      <div><b class="num">${avg}<span style="font-size:14px">%</span></b><small>평균 진도</small></div>
      <div><b class="num">${fin}</b><small>전 과정 완료</small></div></div>`;
    h+=`<div class="card" style="padding:6px 16px">`;
    rows.forEach(r=>{
      h+=`<div style="padding:13px 0;border-bottom:1px solid #EFE8DC">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
          <b style="font-size:16px">${esc(r.n||'')} <span style="color:#6B6175;font-weight:500;font-size:14px">${esc(r.sid||'')}</span></b>
          <span class="num" style="color:#8A6410;font-weight:800;font-size:17px">${r.p||0}%</span></div>
        <div class="bar" style="margin:8px 0 6px"><i style="width:${r.p||0}%"></i></div>
        <div style="font-size:13px;color:#6B6175">${r.ch||0}장 완료 · 워크시트 ${r.ws||0}개 · 퀴즈 ${r.qd||0}문항 정답률 ${r.q||0}% · ${esc(r.t||'')}</div>
      </div>`;
    });
    h+=`</div><button class="btn ghost sm" onclick="copyRoster()">명단 전체 복사</button>
      <button class="btn ghost sm" onclick="clearClass()">명단 지우기</button>`;
  }
  h+=`<div class="card"><h3>안내</h3><p>학생의 워크시트 내용과 자기 진단 응답은 전송되지 않습니다. 신체·외모에 관한 개인 성찰은 학생 기기에만 저장됩니다.</p></div>
    <div style="height:22px"></div></div>`;
  return h;
}
function copyRoster(){
  const rows=mergedRows();
  if(!rows.length){toast('등록된 학생이 없습니다');return}
  const t=['이름\t학번\t진도(%)\t완료 장\t워크시트\t퀴즈 문항\t정답률(%)\t제출']
    .concat(rows.map(r=>[r.n,r.sid,r.p,r.ch,r.ws,r.qd,r.q,r.t].join('\t'))).join('\n');
  toast(copyText(t)?'명단을 복사했습니다. 엑셀에 붙여 넣으세요':'복사에 실패했습니다');
}
function makeCode(r){return ['IMG',r.n,r.sid,r.p,r.ch,r.ws,r.qd,r.q,r.t].join('|')}
async function submitProg(){
  const n=($('pn').value||'').trim(),s=($('ps').value||'').trim();
  if(!n||!s){toast('이름과 학번을 입력해 주세요');return}
  const dt=new Date();
  const now=`${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
  const rec={n:n,sid:s,p:progress(),ch:CH.filter(c=>chDone(c.n)).length,ws:wsCount(),
    q:S.quiz.done?Math.round(S.quiz.right/S.quiz.done*100):0,qd:S.quiz.done,t:now};
  const code=makeCode(rec);
  S.profile={name:n,sid:s,last:now,code:code};save();
  let sent=false;
  if(API_URL){
    const btn=$('subbtn');if(btn){btn.textContent='제출하는 중…';btn.disabled=true}
    try{await apiCall(Object.assign({action:'submit'},rec));sent=true}catch(e){}
    if(btn){btn.disabled=false}
  }
  if(!sent&&HAS_WS){
    const key='class:'+s.replace(/[^0-9A-Za-z가-힣_-]/g,'').slice(0,40);
    try{await window.storage.set(key,JSON.stringify(rec),true);sent=true}catch(e){}
  }
  S.profile.sent=sent;save();
  if(sent)toast('진도를 제출했습니다');
  else toast(copyText(code)?'서버 연결 실패 · 제출 코드를 복사했습니다':'제출 코드를 만들었습니다');
  render();
}
function copyCode(){
  const c=(S.profile||{}).code;
  if(!c){toast('먼저 진도를 제출해 주세요');return}
  toast(copyText(c)?'제출 코드를 복사했습니다':'길게 눌러 직접 복사해 주세요');
}

function saveWs(k,v){S.ws[k]=v;save();const el=$('sv_'+k);if(el){el.textContent='저장됨';clearTimeout(el._t);el._t=setTimeout(()=>el.textContent='',1200)}}
function setDiag(n,i,v){const d=S.diag[String(n)]||[];d[i]=v;S.diag[String(n)]=d;save();render()}
function tog(n,i){const c=S.chk[n]||[];c[i]=!c[i];S.chk[n]=c;save();const was=chDone(n);render();if(was)toast(`${n}장 완료`)}
function setSub(s){view.sub=s;render();window.scrollTo(0,0)}
function openCh(n){view.tab='book';view.ch=n;view.sub='theory';render();window.scrollTo(0,0)}
function go(t){view.tab=t;view.ch=null;view.quiz=null;stopTrain();render();window.scrollTo(0,0)}

const TABS=[['home','🎬','홈'],['book','📖','교재'],['train','🎯','훈련'],['quiz','✍️','퀴즈'],['me','⭐','나']];
function render(){
  let h='';
  if(view.tab==='home')h=home();
  else if(view.tab==='book')h=view.ch?chapter():book();
  else if(view.tab==='train')h=train();
  else if(view.tab==='quiz')h=quiz();
  else if(view.tab==='prof')h=prof();
  else h=me();
  $('app').innerHTML=h;
  $('tabbar').innerHTML=TABS.map(t=>`<button class="${view.tab===t[0]?'on':''}" onclick="go('${t[0]}')"><span class="ic">${t[1]}</span>${t[2]}</button>`).join('');
  if(view.train)updT();
}
(async()=>{await load();await loadClass();render()})();
</script>
